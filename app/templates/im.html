<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <style>
        :root {
            --bg-main: #08131d;
            --bg-side: rgba(5, 18, 29, 0.88);
            --bg-chat: rgba(10, 24, 38, 0.9);
            --card: rgba(9, 25, 39, 0.86);
            --card-strong: rgba(10, 30, 47, 0.96);
            --line: rgba(54, 199, 255, 0.12);
            --line-strong: rgba(54, 199, 255, 0.22);
            --text-main: #f2fbff;
            --text-sub: #9ab8c7;
            --text-mute: #6f8b99;
            --brand: #22d6ff;
            --brand-2: #0b7ea2;
            --user-bubble: linear-gradient(135deg, #0c6788 0%, #18bbe1 100%);
            --other-bubble: rgba(21, 43, 61, 0.98);
            --shadow: 0 28px 64px rgba(0, 0, 0, 0.28);
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; min-height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at 14% 18%, rgba(26, 200, 255, 0.12), transparent 20%),
                radial-gradient(circle at 82% 14%, rgba(45, 154, 255, 0.08), transparent 18%),
                linear-gradient(180deg, #06111a 0%, #071723 52%, #08131d 100%);
            overflow: hidden;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(rgba(31, 208, 255, 0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(31, 208, 255, 0.035) 1px, transparent 1px);
            background-size: 30px 30px;
            mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.58), transparent 96%);
        }
        body.weather-mode {
            background:
                radial-gradient(circle at 16% 16%, rgba(142, 218, 255, 0.18), transparent 18%),
                radial-gradient(circle at 78% 10%, rgba(72, 112, 255, 0.16), transparent 20%),
                linear-gradient(180deg, #0b2033 0%, #12324b 44%, #0c1926 100%);
        }
        .page {
            height: 100vh;
            padding: 12px;
        }
        .topbar {
            display: none;
        }
        .brand h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 800;
        }
        .brand p {
            margin: 8px 0 0;
            color: var(--text-sub);
            font-size: 13px;
            line-height: 1.8;
        }
        .system-switch {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .switch-btn, .ghost-btn, .primary-btn, .tool-btn {
            border: 1px solid var(--line);
            background: rgba(8, 23, 35, 0.92);
            color: var(--text-main);
            height: 40px;
            border-radius: 12px;
            padding: 0 16px;
            cursor: pointer;
            transition: all .2s ease;
            font-size: 14px;
        }
        .switch-btn.active, .primary-btn {
            background: linear-gradient(135deg, #0e4258 0%, #0f7ca3 54%, #1ce2ff 100%);
            border-color: rgba(28, 226, 255, 0.38);
            box-shadow: 0 12px 26px rgba(13, 124, 163, 0.22);
        }
        .ghost-btn:hover, .tool-btn:hover, .switch-btn:hover {
            border-color: var(--line-strong);
        }
        .layout {
            display: grid;
            grid-template-columns: 92px 340px 1fr;
            gap: 14px;
            height: 100%;
        }
        .nav-rail, .sidebar, .chat-area {
            min-height: 0;
            border-radius: 24px;
            background: var(--bg-side);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
            overflow: hidden;
        }
        .nav-rail {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 14px 10px;
            gap: 14px;
            background: rgba(6, 18, 28, 0.96);
        }
        .rail-profile {
            width: 100%;
            padding: 12px 8px;
            border-radius: 24px;
            background: rgba(11, 30, 46, 0.98);
            border: 1px solid rgba(44, 161, 208, 0.14);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            text-align: center;
        }
        .rail-avatar {
            width: 52px;
            height: 52px;
            border-radius: 18px;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(11, 91, 130, 0.96), rgba(27, 183, 225, 0.92));
            border: 1px solid rgba(34, 214, 255, 0.22);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ebfbff;
            font-size: 20px;
            font-weight: 800;
        }
        .rail-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        .rail-profile-name {
            font-size: 13px;
            font-weight: 700;
            line-height: 1.4;
            word-break: break-all;
        }
        .rail-profile-role {
            font-size: 11px;
            color: var(--text-sub);
        }
        .rail-nav {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 4px;
        }
        .rail-actions {
            width: 100%;
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-top: 8px;
            border-top: 1px solid rgba(54, 199, 255, 0.08);
        }
        .rail-tab {
            width: 100%;
            height: 48px;
            border-radius: 16px;
            border: 1px solid transparent;
            background: rgba(10, 26, 40, 0.94);
            color: var(--text-sub);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all .2s ease;
            position: relative;
        }
        .rail-tab.active {
            color: var(--text-main);
            border-color: rgba(34, 214, 255, 0.3);
            background: rgba(16, 48, 67, 0.98);
            box-shadow: inset 0 0 0 1px rgba(34, 214, 255, 0.08);
        }
        .rail-tab svg {
            width: 19px;
            height: 19px;
        }
        .rail-tab:hover {
            color: var(--text-main);
            border-color: rgba(34, 214, 255, 0.2);
        }
        .rail-badge-dot {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: linear-gradient(135deg, rgba(214, 31, 67, 0.96), rgba(255, 88, 88, 0.92));
            border: 1px solid rgba(255, 210, 220, 0.3);
            box-shadow: 0 0 0 2px rgba(10, 26, 40, 0.9), 0 4px 10px rgba(113, 10, 34, 0.4);
            display: none;
        }
        .rail-badge-dot.active {
            display: block;
        }
        .sidebar {
            display: flex;
            flex-direction: column;
        }
        .middle-panel {
            background: rgba(7, 18, 29, 0.96);
        }
        .sidebar-top {
            padding: 14px;
            border-bottom: 1px solid var(--line);
            background: rgba(8, 20, 31, 0.94);
        }
        .user-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(23, 49, 66, 0.96);
            border: 1px solid var(--line);
            color: #dff7ff;
            font-size: 12px;
        }
        .side-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        .side-actions button {
            flex: 1;
        }
        .refresh-icon-btn {
            width: 42px;
            min-width: 42px;
            padding: 0;
            flex: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .refresh-icon-btn svg,
        .search-submit-btn svg {
            width: 18px;
            height: 18px;
            display: block;
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-top: 2px;
        }
        .middle-header {
            padding: 14px;
            border-bottom: 1px solid var(--line);
            background: rgba(8, 20, 31, 0.94);
        }
        .plus-menu {
            position: relative;
        }
        .plus-btn {
            width: 42px;
            min-width: 42px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .plus-btn svg {
            width: 18px;
            height: 18px;
        }
        .plus-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            min-width: 148px;
            padding: 8px;
            border-radius: 14px;
            border: 1px solid rgba(56, 160, 201, 0.16);
            background: rgba(7, 21, 33, 0.98);
            box-shadow: 0 18px 36px rgba(0, 0, 0, 0.26);
            display: none;
            z-index: 20;
        }
        .plus-dropdown.active {
            display: block;
        }
        .plus-item {
            width: 100%;
            height: 40px;
            border: 0;
            background: transparent;
            color: var(--text-main);
            border-radius: 10px;
            text-align: left;
            padding: 0 12px;
            cursor: pointer;
        }
        .plus-item:hover {
            background: rgba(15, 45, 63, 0.98);
        }
        .tab-btn {
            width: 48px;
            height: 40px;
            border-radius: 12px;
            border: 1px solid transparent;
            background: rgba(12, 28, 41, 0.92);
            color: var(--text-sub);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .tab-btn.active {
            color: var(--text-main);
            border-color: rgba(34, 214, 255, 0.3);
            background: rgba(15, 45, 63, 0.98);
        }
        .tab-btn:hover {
            border-color: rgba(34, 214, 255, 0.2);
            color: var(--text-main);
        }
        .tab-btn svg {
            width: 18px;
            height: 18px;
            display: block;
        }
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
        .search-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .search-input-wrap {
            position: relative;
            flex: 1;
        }
        .search-input-wrap svg {
            position: absolute;
            left: 14px;
            top: 50%;
            width: 16px;
            height: 16px;
            transform: translateY(-50%);
            color: var(--text-mute);
            pointer-events: none;
        }
        .search-row input {
            flex: 1;
            height: 40px;
            border-radius: 12px;
            border: 1px solid var(--line);
            background: rgba(6, 17, 27, 0.92);
            color: var(--text-main);
            padding: 0 14px 0 40px;
            outline: none;
        }
        .search-submit-btn {
            width: 42px;
            min-width: 42px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .sidebar-body {
            min-height: 0;
            flex: 1;
            overflow: hidden;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .sidebar-panels {
            min-height: 0;
            flex: 1;
            overflow: auto;
            padding-right: 4px;
        }
        .sidebar-footer {
            flex-shrink: 0;
        }
        .panel-block {
            display: none;
            gap: 12px;
            flex-direction: column;
        }
        .panel-block.active {
            display: flex;
        }
        .section-card {
            padding: 14px;
            border-radius: 18px;
            background: rgba(10, 25, 38, 0.96);
            border: 1px solid rgba(44, 161, 208, 0.14);
        }
        .friend-request-stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .request-panel {
            padding: 12px;
            border-radius: 16px;
            background: rgba(11, 29, 44, 0.82);
            border: 1px solid rgba(56, 160, 201, 0.12);
        }
        .request-panel-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 13px;
            font-weight: 700;
        }
        .request-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .request-item {
            padding: 10px;
            border-radius: 14px;
            background: rgba(8, 23, 35, 0.92);
            border: 1px solid rgba(56, 160, 201, 0.1);
        }
        .section-title {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: 700;
        }
        .hint {
            color: var(--text-sub);
            font-size: 12px;
            line-height: 1.7;
        }
        .conversation-list, .friend-list, .employee-list, .search-result-list, .member-mini-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .conversation-item, .friend-item, .search-item {
            padding: 12px;
            border-radius: 16px;
            background: rgba(11, 29, 44, 0.95);
            border: 1px solid rgba(56, 160, 201, 0.12);
            cursor: pointer;
        }
        .list-item-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        .list-avatar {
            width: 44px;
            height: 44px;
            border-radius: 16px;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: linear-gradient(135deg, rgba(12, 72, 102, 0.96), rgba(23, 144, 194, 0.92));
            border: 1px solid rgba(34, 214, 255, 0.18);
            color: #ecfbff;
            font-size: 16px;
            font-weight: 800;
        }
        .list-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .item-body {
            min-width: 0;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .conversation-item.active {
            border-color: rgba(34, 214, 255, 0.32);
            box-shadow: inset 0 0 0 1px rgba(34, 214, 255, 0.08), 0 12px 22px rgba(11, 58, 77, 0.18);
        }
        .item-title {
            display: flex;
            justify-content: flex-start;
            gap: 10px;
            align-items: flex-start;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .item-title-main {
            min-width: 0;
            flex: 1;
        }
        .item-title-side {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .item-side {
            min-width: 34px;
            align-self: stretch;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: space-between;
            gap: 10px;
        }
        .item-side.time-only {
            justify-content: flex-end;
        }
        .item-time {
            color: var(--text-sub);
            font-size: 12px;
            line-height: 1;
            text-align: right;
            white-space: nowrap;
        }
        .item-meta, .item-sub {
            color: var(--text-sub);
            font-size: 12px;
            line-height: 1.5;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .item-name {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }
        .item-name-text {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .item-type-icon {
            width: 22px;
            height: 22px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #dff9ff;
            background: rgba(18, 57, 79, 0.96);
            border: 1px solid rgba(54, 199, 255, 0.18);
            flex-shrink: 0;
        }
        .item-type-icon svg {
            width: 13px;
            height: 13px;
            display: block;
        }
        .unread-badge {
            min-width: 20px;
            height: 20px;
            padding: 0 6px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(158, 24, 59, 0.72) 0%, rgba(187, 47, 47, 0.58) 100%);
            border: 1px solid rgba(255, 101, 101, 0.38);
            backdrop-filter: blur(10px);
            color: #fff1f4;
            font-size: 11px;
            font-weight: 700;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 10px 22px rgba(92, 8, 27, 0.34);
        }
        .mini-btn-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .mini-action-btn {
            width: 34px;
            height: 34px;
            border-radius: 11px;
            border: 1px solid rgba(28, 226, 255, 0.28);
            background: linear-gradient(135deg, rgba(14, 66, 88, 0.96) 0%, rgba(15, 124, 163, 0.94) 54%, rgba(28, 226, 255, 0.92) 100%);
            color: #f8ffff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(13, 124, 163, 0.18);
        }
        .mini-action-btn svg {
            width: 14px;
            height: 14px;
            display: block;
        }
        .mini-btn {
            height: 32px;
            padding: 0 12px;
            border-radius: 10px;
            border: 1px solid rgba(37, 161, 207, 0.2);
            background: rgba(12, 36, 53, 0.96);
            color: var(--text-main);
            cursor: pointer;
            font-size: 12px;
        }
        .mini-btn.danger {
            border-color: rgba(255, 108, 108, 0.22);
            background: rgba(60, 17, 24, 0.96);
            color: #ffd8dd;
        }
        .mini-btn.muted {
            opacity: 0.72;
            cursor: default;
        }
        .employee-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            border-radius: 14px;
            background: rgba(13, 33, 49, 0.96);
            border: 1px solid rgba(34, 214, 255, 0.14);
            cursor: pointer;
            font-size: 13px;
            color: #dcf7ff;
        }
        .chat-area {
            display: flex;
            flex-direction: column;
            min-height: 0;
            background: var(--bg-chat);
        }
        .chat-header {
            padding: 18px 20px 14px;
            border-bottom: 1px solid var(--line);
            background: rgba(8, 19, 30, 0.98);
        }
        .chat-head-top {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
        }
        .chat-head-actions {
            position: relative;
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: flex-end;
        }
        .chat-head-icon-btn {
            width: 38px;
            height: 38px;
            padding: 0;
            border-radius: 12px;
            border: 1px solid var(--line);
            background: rgba(8, 23, 35, 0.92);
            color: var(--text-main);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .chat-head-icon-btn svg {
            width: 17px;
            height: 17px;
            display: block;
        }
        .chat-title-row {
            display: flex;
            align-items: center;
        }
        .chat-title {
            font-size: 20px;
            font-weight: 800;
        }
        .chat-sub {
            color: var(--text-sub);
            font-size: 13px;
            line-height: 1.8;
            margin-top: 8px;
        }
        .member-popover {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            min-width: 250px;
            max-width: 320px;
            padding: 12px;
            border-radius: 16px;
            border: 1px solid rgba(56, 160, 201, 0.16);
            background: rgba(7, 21, 33, 0.98);
            box-shadow: 0 18px 36px rgba(0, 0, 0, 0.26);
            display: none;
            z-index: 30;
        }
        .member-popover.active {
            display: block;
        }
        .member-popover-title {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .member-popover-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 220px;
            overflow: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(35, 154, 201, 0.72) rgba(7, 21, 33, 0.96);
        }
        .member-popover-list::-webkit-scrollbar {
            width: 10px;
        }
        .member-popover-list::-webkit-scrollbar-track {
            background: rgba(7, 21, 33, 0.96);
            border-radius: 999px;
        }
        .member-popover-list::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, rgba(23, 144, 194, 0.92), rgba(13, 92, 128, 0.96));
            border-radius: 999px;
            border: 2px solid rgba(7, 21, 33, 0.96);
        }
        .member-popover-list::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, rgba(34, 186, 240, 0.96), rgba(15, 109, 150, 0.98));
        }
        .member-popover-item {
            padding: 8px 10px;
            border-radius: 12px;
            border: 1px solid rgba(55, 173, 222, 0.12);
        }
        .group-settings-popover {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            min-width: 180px;
            padding: 8px;
            border-radius: 12px;
            border: 1px solid rgba(56, 160, 201, 0.16);
            background: rgba(7, 21, 33, 0.98);
            box-shadow: 0 18px 36px rgba(0, 0, 0, 0.26);
            display: none;
            z-index: 30;
        }
        .group-settings-popover.active {
            display: block;
        }
        .popover-title {
            font-size: 12px;
            font-weight: 600;
            padding: 8px 12px;
            margin-bottom: 4px;
            color: rgba(255, 255, 255, 0.6);
            border-bottom: 1px solid rgba(56, 160, 201, 0.12);
        }
        .popover-item {
            width: 100%;
            padding: 10px 12px;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.9);
            font-size: 13px;
            text-align: left;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

            align-items: center;
        }
        .modal-actions {
            margin-top: 18px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        .status-line {
            margin-top: 10px;
            font-size: 12px;
            color: var(--text-sub);
        }
        @media (max-width: 1100px) {
            .layout {
                grid-template-columns: 84px 300px 1fr;
            }
        }
    </style>
</head>
<body>

                    <button class="rail-tab" data-tab="groups" type="button" onclick="switchTab('groups', this)" title="群聊" aria-label="群聊">

                                    <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path>

    <script>
        var state = {
            currentUser: null,
            conversations: [],
            friends: [],
            friendRequests: { incoming: [], outgoing: [] },
            employees: [],
            currentConversation: null,
            currentMessages: [],
            currentMembers: [],
            currentTab: 'sessions',
            searchMode: 'friends',
            syncInProgress: false,
            lastSyncAt: 0,
            unreadTotal: 0,
            eventSource: null,
            streamConnected: false
        };
        var emojiList = ['😀', '😄', '😂', '😍', '😎', '🥳', '🤖', '🌤️', '🎵', '🎉', '👍', '❤️'];

        function escapeHtml(value) {
            return String(value || '').replace(/[&<>"']/g, function (s) {
                return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[s];
            });
        }

        function escapeAttr(value) {
            return String(value || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function copyMessage(btn) {
            var content = btn.getAttribute('data-content') || '';
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(content).then(function(){
                    btn.setAttribute('title', '已复制');
                    setTimeout(function(){ btn.setAttribute('title', '复制'); }, 1500);
                });
            }
        }

        function deleteMessage(btn) {
            var row = btn.closest('.message-row');
            if (row) {
                row.remove();
            }
        }

        function getCookie(name) {
            var match = document.cookie.match(new RegExp('(?:^|; )' + name.replace(/([.$?*|{}()[\]\\/+^])/g, '\\$1') + '=([^;]*)'));
            return match ? decodeURIComponent(match[1]) : '';
        }

        function getXsrfToken() {
            return getCookie('_xsrf');
        }

        async function apiGet(action, params) {
            var url = new URL('/api/im', window.location.origin);
            url.searchParams.set('action', action);
            Object.keys(params || {}).forEach(function (key) {
                if (params[key] !== undefined && params[key] !== null && params[key] !== '') {
                    url.searchParams.set(key, params[key]);
                }
            });
            var resp = await fetch(url.toString(), { credentials: 'same-origin' });
            return resp.json();
        }

        async function apiPost(action, payload) {
            var body = new URLSearchParams();
            body.set('_xsrf', getXsrfToken());
            Object.keys(payload || {}).forEach(function (key) {
                if (payload[key] !== undefined && payload[key] !== null) {
                    body.set(key, payload[key]);
                }
            });
            var resp = await fetch('/api/im?action=' + encodeURIComponent(action), {
                method: 'POST',
                credentials: 'same-origin',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
                body: body.toString()
            });
            return resp.json();
        }

        function setStatus(text) {
            document.getElementById('statusLine').textContent = text;
        }

        function getUnreadBadgeHtml(count) {
            var value = Number(count || 0);
            if (value <= 0) {
                return '';
            }
            return '<span class="unread-badge">' + escapeHtml(value > 99 ? '99+' : String(value)) + '</span>';
        }

        function getDisplayInitial(text) {
            return String(text || 'U').trim().slice(0, 1).toUpperCase() || 'U';
        }

        function renderAvatarNode(url, text, className) {
            var name = className || 'avatar';
            var imageHtml = url ? '<img src="' + escapeHtml(url) + '" alt="头像" style="display:block;">' : '';
            var fallbackHtml = '<span' + (url ? ' style="display:none;"' : '') + '>' + escapeHtml(getDisplayInitial(text)) + '</span>';
            return '<div class="' + name + '">' + imageHtml + fallbackHtml + '</div>';
        }

        function getGroupIconHtml() {
            return '<span class="item-type-icon" title="群聊"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="7" cy="8" r="3"></circle><circle cx="17" cy="8" r="3"></circle><path d="M2 19a5 5 0 0 1 10 0"></path><path d="M12 19a5 5 0 0 1 10 0"></path></svg></span>';
        }

        function getRobotIconHtml() {
            return '<span class="item-type-icon" title="数字员工"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="5" width="16" height="12" rx="3"></rect><path d="M9 21h6"></path><path d="M12 17v4"></path><circle cx="9" cy="11" r="1"></circle><circle cx="15" cy="11" r="1"></circle></svg></span>';
        }

        function getConversationRightIcon(item) {
            if (!item) {
                return '';
            }
            if (item.chat_type === 'group') {
                return getGroupIconHtml();
            }
            if (item.chat_type === 'employee') {
                return getRobotIconHtml();
            }
            return '';
        }

        function getSendIconButtonHtml(onclickCode, title) {
            return '' +
                '<button class="mini-action-btn" type="button" onclick="' + onclickCode + '" title="' + escapeHtml(title || '发送消息') + '" aria-label="' + escapeHtml(title || '发送消息') + '">' +
                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
                        '<path d="M22 2 11 13"></path>' +
                        '<path d="m22 2-7 20-4-9-9-4Z"></path>' +
                    '</svg>' +
                '</button>';
        }

        function getConversationDisplayName(item) {
            if (!item) {
                return '';
            }
            if (item.chat_type === 'group') {
                return (item.display_name || '未命名群聊') + '（' + Number(item.member_count || 0) + '）';
            }
            return item.display_name || '';
        }

        function updateMiddleSearchUI() {
            var input = document.getElementById('userSearchInput');
            if (!input) {
                return;
            }
            var mode = state.searchMode || state.currentTab || 'friends';
            var placeholders = {
                sessions: '搜索消息会话',
                friends: '搜索已添加的好友',
                requests: '搜索好友申请',
                groups: '搜索群聊',
                employees: '搜索数字员工',
                discover: '在此搜索其他用户'
            };
            input.placeholder = placeholders[mode] || '搜索';
        }

        function closePlusMenu() {
            var dropdown = document.getElementById('plusDropdown');
            if (dropdown) {
                dropdown.classList.remove('active');
            }
        }

        function togglePlusMenu() {
            var dropdown = document.getElementById('plusDropdown');
            if (!dropdown) {
                return;
            }
            dropdown.classList.toggle('active');
        }

        function setActivePanel(tab, activeRailTab) {
            state.currentTab = tab;
            if (tab !== 'discover') {
                state.searchMode = tab;
            }
            document.querySelectorAll('.rail-tab').forEach(function (node) {
                node.classList.toggle('active', node.getAttribute('data-tab') === (activeRailTab || tab));
            });
            document.querySelectorAll('.panel-block').forEach(function (node) {
                node.classList.toggle('active', node.id === 'tab-' + tab);
            });
            updateMiddleSearchUI();
            closePlusMenu();
            if (tab === 'sessions') {
                renderConversations();
            } else if (tab === 'friends') {
                renderFriends();
            } else if (tab === 'requests') {

        function quitGroup() {
            if (!state.currentConversation) {
                return;
            }
            var groupName = state.currentConversation.display_name || '该群聊';
            if (confirm('确定要退出 "' + groupName + '" 吗？退出后将不再接收该群消息。')) {
                var convId = state.currentConversation.id;
                
                apiPost('delete_conversation', {
                    conversation_id: convId
                }).then(function(data) {
                    if (data.code === 0) {
                    // 从会话列表中移除
                    state.conversations = state.conversations.filter(function(c) {
                        return c.id !== convId;
                    });
                    renderConversations();
                    
                    // 清空聊天窗口
                    document.getElementById('messageList').innerHTML = '<div class="empty-chat"><div style="font-size:20px;font-weight:800;margin-bottom:8px;">已退出群聊</div><div>您已退出该群聊，可重新加入或选择其他会话。</div></div>';
                    state.currentConversation = null;
                    state.messages = [];
                    state.currentMembers = [];
                    document.getElementById('chatTitle').textContent = '请选择一个会话';
                    document.getElementById('groupSettingsBtn').style.display = 'none';
                    document.getElementById('memberToggleBtn').style.display = 'none';
                    closeGroupSettings();
                    showToast('已退出群聊', 'success');
                    } else {
                        showToast('退出失败：' + data.msg, 'error');
                    }
                }).catch(function(err) {
                    showToast('退出失败：' + (err.message || '网络错误'), 'error');
                });
            }
        }

        function getAvailableMentionEmployees() {
            if (!state.currentConversation) {
                return [];
            }
            if (state.currentConversation.chat_type === 'group') {
                return (state.currentMembers || [])
                    .filter(function (item) { return item.member_type === 'employee' && item.alias; })
                    .map(function (item) {
                        return { id: item.employee_id, alias: item.alias, name: item.name || item.alias };
                    });
            }
            if (state.currentConversation.chat_type === 'employee' && state.currentConversation.target_employee_id) {
                var target = (state.employees || []).find(function (item) {
                    return Number(item.id) === Number(state.currentConversation.target_employee_id);
                });
                if (target) {
                    return [{ id: target.id, alias: target.alias, name: target.name || target.alias }];
                }
            }
            return [];
        }

        function renderMentionTools() {
            var row = document.getElementById('mentionRow');
            var chips = document.getElementById('mentionChipList');
            var input = document.getElementById('messageInput');
            var employees = getAvailableMentionEmployees();

            chips.innerHTML = '';

            if (!state.currentConversation) {
                row.classList.remove('active');
                input.placeholder = '输入消息，先从左侧选择一个会话';
                return;
            }
            if (state.currentConversation.chat_type === 'employee' && employees.length) {
                row.classList.add('active');
                chips.innerHTML = employees.map(function (item) {
                    return '<button class="mention-chip" type="button" onclick="insertMentionText(\'' + String(item.alias).replace(/\\/g, '\\\\').replace(/'/g, "\\'") + '\')">@' + escapeHtml(item.alias) + '</button>';
                }).join('');
                input.placeholder = '直接给 ' + employees[0].name + ' 发送消息即可';
                return;
            }
            if (state.currentConversation.chat_type === 'group' && employees.length) {
                row.classList.add('active');
                chips.innerHTML = employees.map(function (item) {
                    return '<button class="mention-chip" type="button" onclick="insertMentionText(\'' + String(item.alias).replace(/\\/g, '\\\\').replace(/'/g, "\\'") + '\')">@' + escapeHtml(item.alias) + '</button>';

        async function sendEmojiMessage(emoji) {
            if (!state.currentConversation) {
                appendEmoji(emoji);
                return;
            }
            setStatus('正在发送表情...');
            var resp = await apiPost('send_message', {
                conversation_id: state.currentConversation.id,
                content_type: 'emoji',
                content_text: emoji,
                extra_json: '{}'
            });
            if (resp.code !== 0) {
                setStatus(resp.msg || '表情发送失败');
                return;
            }
            state.currentMessages = state.currentMessages.concat(resp.data.messages || []);
            state.currentConversation = resp.data.conversation || state.currentConversation;
            mergeConversation(state.currentConversation);
            renderMessages(true);
            renderConversations();
            setStatus('表情已发送');
        }

        function formatFileSize(size) {
            var value = Number(size || 0);
            if (!value) {
                return '0 B';
            }
            if (value < 1024) {
                return value + ' B';
            }
            if (value < 1024 * 1024) {
                return (value / 1024).toFixed(1) + ' KB';
            }
            return (value / (1024 * 1024)).toFixed(2) + ' MB';
        }

        var BEIJING_OFFSET_MS = 8 * 60 * 60 * 1000;

        function parseRawDateTimeMatch(value) {
            var text = String(value || '').trim();
            if (!text) {
                return null;
            }
            return text.match(/^(\d{4})-(\d{2})-(\d{2})(?:\s+(\d{2}):(\d{2})(?::(\d{2}))?)?$/);
        }

        function getBeijingNow() {
            return new Date();
        }

        function getBeijingDayStart(date) {
            return new Date(date.getFullYear(), date.getMonth(), date.getDate()).getTime();
        }

        function parseDateTimeText(value) {
            var match = parseRawDateTimeMatch(value);
            if (!match) {
                return null;
            }
            var date = new Date(
                Number(match[1]),
                Number(match[2]) - 1,
                Number(match[3]),
                Number(match[4] || 0),
                Number(match[5] || 0),
                Number(match[6] || 0)
            );
            return isNaN(date.getTime()) ? null : date;
        }

        function formatConversationTime(value) {
            var text = String(value || '').trim();
            if (!text) {
                return '';
            }
            var date = parseDateTimeText(text);
            if (!date) {
                return text;
            }
            var now = getBeijingNow();
            var diffDays = Math.round((getBeijingDayStart(now) - getBeijingDayStart(date)) / 86400000);
            if (diffDays === 0) {
                return String(date.getHours()).padStart(2, '0') + ':' + String(date.getMinutes()).padStart(2, '0');
            }
            if (diffDays === 1) {
                return '昨天';
            }
            return String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0');
        }

        function formatMessageDividerTime(value) {
            var date = parseDateTimeText(value);
            if (!date) {
                return String(value || '').trim();
            }
            var now = getBeijingNow();
            var diffDays = Math.round((getBeijingDayStart(now) - getBeijingDayStart(date)) / 86400000);
            var hh = String(date.getHours()).padStart(2, '0');
            var mm = String(date.getMinutes()).padStart(2, '0');
            if (diffDays === 0) {
                return hh + ':' + mm;
            }
            if (diffDays === 1) {
                return '昨天 ' + hh + ':' + mm;
            }
            return String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0') + ' ' + hh + ':' + mm;
        }

        function shouldShowMessageDivider(previousItem, currentItem) {
            if (!previousItem || !currentItem) {
                return false;
            }
            var previousDate = parseDateTimeText(previousItem.create_at);
            var currentDate = parseDateTimeText(currentItem.create_at);
            if (!previousDate || !currentDate) {
                return false;
            }
            return currentDate.getTime() - previousDate.getTime() >= 3 * 60 * 1000;
        }

            var text = String(weatherText || '');
            if (text.indexOf('晴') !== -1) return '☀️';
            if (text.indexOf('多云') !== -1) return '⛅';
            if (text.indexOf('阴') !== -1) return '☁️';

            if (text.indexOf('中雨') !== -1) return '️';
            if (text.indexOf('大雨') !== -1 || text.indexOf('暴雨') !== -1) return '⛈️';
            if (text.indexOf('雷') !== -1) return '⚡';
            if (text.indexOf('雪') !== -1) return '❄️';
            if (text.indexOf('雾') !== -1 || text.indexOf('霾') !== -1) return '🌫️';
            if (text.indexOf('风') !== -1) return '💨';
            return '🌤️';
        }

        function getWeatherRecommendation(weatherText) {
            var text = String(weatherText || '');
            if (text.indexOf('晴') !== -1) return '☀️ 适合出游';
            if (text.indexOf('多云') !== -1) return '⛅ 适宜出行';
            if (text.indexOf('阴') !== -1) return '☁️ 注意保暖';
            if (text.indexOf('小雨') !== -1 || text.indexOf('毛毛雨') !== -1) return '🌦️ 建议带伞';
            if (text.indexOf('中雨') !== -1) return '️ 建议带伞';
            if (text.indexOf('大雨') !== -1 || text.indexOf('暴雨') !== -1) return '⛈️ 减少外出';
            if (text.indexOf('雷') !== -1) return '⚡ 注意安全';
            if (text.indexOf('雪') !== -1) return '❄️ 注意防寒';
            if (text.indexOf('雾') !== -1 || text.indexOf('霾') !== -1) return '🌫️ 注意防护';
            if (text.indexOf('风') !== -1) return '💨 注意防风';
            return '️ 适宜出行';
        }

            var tempLow = weather.tempn || weather.low || '--';
            var wind = weather.wind || weather.windDir || '--';
            var windSpeed = weather.windSpeed || weather.wind_speed || '--';
            var current = weather.current && typeof weather.current === 'object' ? weather.current : {};
            var air = weather.air || weather.aqi || current.air || current.aqi || weather.airQuality || current.airQuality || '--';
            var humidity = weather.humidity || weather.shidu || current.humidity || '--';
            var icon = getWeatherIcon(weatherText);
            var recommendation = getWeatherRecommendation(weatherText);

        function isWeatherCardPayload(payload) {
            return !!(payload && typeof payload === 'object' && (
                payload.weather !== undefined ||
                payload.temp !== undefined ||
                payload.tempn !== undefined ||
                payload.wind !== undefined ||
                (payload.current && typeof payload.current === 'object')
            ));
        }

        function fetchWeatherImage(cardContainer, city, weatherText, spots) {
            console.log('[Weather] fetchWeatherImage called with:', {city: city, weatherText: weatherText});
            var weatherCard = cardContainer.querySelector('.weather-card');
            console.log('[Weather] Weather card element:', weatherCard ? 'found' : 'NOT FOUND');
            if (!weatherCard) {
                console.error('[Weather] No weather card found in container!');
                return;
            }
            console.log('[Weather] Card classes:', weatherCard.className);
            if (weatherCard.classList.contains('has-background')) {
                console.log('[Weather] Already has background, skip');
                return;
            }
            if (weatherCard.classList.contains('bg-failed')) {
                console.log('[Weather] Previously failed, skip');
                return;
            }
            console.log('[Weather] Creating loading indicator and fetching image...');
            var loadingDiv = document.createElement('div');
            loadingDiv.className = 'bg-loading';
            loadingDiv.textContent = '正在生成背景图...';
            weatherCard.appendChild(loadingDiv);
            fetch('/api/weather/image', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    city: city,
                    weather: weatherText,
                    spots: spots
                })
            })
            .then(function(response) {
                if (!response.ok) {
                    throw new Error('HTTP error! status: ' + response.status);
                }
                return response.json();
            })
            .then(function(result) {
                console.log('Weather image API response:', result);
                if (result.code === 0 && result.data && result.data.image_url) {
                    var imageUrl = result.data.image_url;
                    console.log('Setting background image:', imageUrl);
                    var img = new Image();
                    img.onload = function() {
                        weatherCard.style.backgroundImage = 'url(' + imageUrl + ')';
                        weatherCard.classList.add('has-background');
                        console.log('Background image loaded successfully');
                    };
                    img.onerror = function() {
                        console.error('Failed to load background image:', imageUrl);
                        weatherCard.classList.add('bg-failed');
                    };
                    img.src = imageUrl;
                } else {
                    console.warn('Weather image API returned error:', result.msg);
                }
                if (loadingDiv.parentNode) {
                    loadingDiv.parentNode.removeChild(loadingDiv);
                }
            })
            .catch(function(error) {
                console.error('Weather image generation failed:', error);
                if (loadingDiv.parentNode) {
                    loadingDiv.parentNode.removeChild(loadingDiv);
                }
            });
        }

        function resolveMusicCard(extra) {
            if (!extra || typeof extra !== 'object') {
                return null;
            }
            if (extra.music_card && typeof extra.music_card === 'object') {
                return extra.music_card;
            }
            if (extra.payload && typeof extra.payload === 'object') {
                if (extra.payload.data && isMusicCardPayload(extra.payload.data)) {
                    return extra.payload.data;
                }
                if (isMusicCardPayload(extra.payload)) {
                    return extra.payload;
                }
            }
            return null;
        }

        function toggleMusicCardPlayback(button) {
            var card = button && button.closest('.music-card');
            var audio = card ? card.querySelector('.music-audio') : null;
            var label = button ? button.querySelector('.music-play-label') : null;
            var playIcon = '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 6.5v11l9-5.5-9-5.5Z"></path></svg>';
            var pauseIcon = '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 4h4v16H6V4Zm8 0h4v16h-4V4Z"></path></svg>';
            if (!audio || !label) {
                return;
            }
            if (audio.paused) {
                audio.play().then(function () {
                    label.textContent = '暂停';
                    button.innerHTML = pauseIcon + '<span class="music-play-label">暂停</span>';
                    startMusicProgressTracking(audio);
                }).catch(function () {
                    label.textContent = '播放失败';
                });
            } else {
                audio.pause();
                label.textContent = '播放';
                button.innerHTML = playIcon + '<span class="music-play-label">播放</span>';
                stopMusicProgressTracking(audio);
            }
        }

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            var mins = Math.floor(seconds / 60);
            var secs = Math.floor(seconds % 60);
            return mins + ':' + (secs < 10 ? '0' : '') + secs;
        }

        function startMusicProgressTracking(audio) {
            if (!audio) return;
            var updateProgress = function() {
                if (audio.paused || audio.ended) {
                    stopMusicProgressTracking(audio);
                    return;
                }
                var card = audio.closest('.music-card');
                if (!card) return;
                var currentTime = audio.currentTime || 0;
                var duration = audio.duration || 0;
                var progressFill = card.querySelector('.music-progress-fill');
                var progressHandle = card.querySelector('.music-progress-handle');
                var timeCurrent = card.querySelector('.music-time-current');
                var timeTotal = card.querySelector('.music-time-total');
                if (progressFill && duration > 0) {
                    var percent = (currentTime / duration) * 100;
                    progressFill.style.width = percent + '%';
                    if (progressHandle) {
                        progressHandle.style.left = percent + '%';
                    }
                }
                if (timeCurrent) {
                    timeCurrent.textContent = formatTime(currentTime);
                }
                if (timeTotal && duration > 0) {
                    timeTotal.textContent = formatTime(duration);
                }
                requestAnimationFrame(updateProgress);
            };
            audio._progressTimer = requestAnimationFrame(updateProgress);
        }

        function stopMusicProgressTracking(audio) {
            if (audio && audio._progressTimer) {
                cancelAnimationFrame(audio._progressTimer);
                audio._progressTimer = null;
            }
        }

        function onMusicEnded(audio) {
            var card = audio && audio.closest('.music-card');
            if (!card) return;
            var playlistStr = card.getAttribute('data-playlist');
            var currentIndex = parseInt(card.getAttribute('data-current-index') || '0', 10);
            var playlist = [];
            try {
                playlist = JSON.parse(playlistStr || '[]');
            } catch (e) {
                playlist = [];
            }
            if (playlist.length > 1 && currentIndex < playlist.length - 1) {
                musicNext(card.querySelector('.music-next-btn'));
            } else {
                resetMusicCardPlayback(audio);
            }
        }

        function resetMusicCardPlayback(audio) {
            var card = audio && audio.closest('.music-card');
            var playBtn = card ? card.querySelector('.music-play-btn') : null;
            var label = playBtn ? playBtn.querySelector('.music-play-label') : null;
            var playIcon = '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 6.5v11l9-5.5-9-5.5Z"></path></svg>';
            if (label) {
                label.textContent = '播放';
            }
            if (playBtn) {
                playBtn.innerHTML = playIcon + '<span class="music-play-label">播放</span>';
            }
            var progressFill = card ? card.querySelector('.music-progress-fill') : null;
            var progressHandle = card ? card.querySelector('.music-progress-handle') : null;
            var timeCurrent = card ? card.querySelector('.music-time-current') : null;
            if (progressFill) progressFill.style.width = '0%';
            if (progressHandle) progressHandle.style.left = '0%';
            if (timeCurrent) timeCurrent.textContent = '0:00';
            stopMusicProgressTracking(audio);
        }

        function changeMusicVolume(slider) {
            var card = slider && slider.closest('.music-card');
            var audio = card ? card.querySelector('.music-audio') : null;
            if (audio) {

            }
        }

        function musicPrev(button) {
            var card = button && button.closest('.music-card');
            if (!card) return;
            var playlistStr = card.getAttribute('data-playlist');
            var currentIndex = parseInt(card.getAttribute('data-current-index') || '0', 10);
            var playlist = [];
            try {
                playlist = JSON.parse(playlistStr || '[]');
            } catch (e) {
                playlist = [];
            }
            if (playlist.length <= 1) return;
            var newIndex = currentIndex > 0 ? currentIndex - 1 : playlist.length - 1;
            loadMusicTrack(card, playlist, newIndex);
        }

        function musicNext(button) {
            var card = button && button.closest('.music-card');
            if (!card) return;
            var playlistStr = card.getAttribute('data-playlist');
            var currentIndex = parseInt(card.getAttribute('data-current-index') || '0', 10);
            var playlist = [];
            try {
                playlist = JSON.parse(playlistStr || '[]');
            } catch (e) {
                playlist = [];
            }
            if (playlist.length <= 1) return;
            var newIndex = currentIndex < playlist.length - 1 ? currentIndex + 1 : 0;
            loadMusicTrack(card, playlist, newIndex);
        }

        function loadMusicTrack(card, playlist, index) {
            if (!card || !playlist || index < 0 || index >= playlist.length) return;
            var track = playlist[index];
            if (!track) return;
            var audio = card.querySelector('.music-audio');
            var playUrl = track.Music || track.music || track.url || track.audio || track.play_url || '';
            if (!playUrl || !audio) return;
            audio.src = playUrl;
            audio.load();
            card.setAttribute('data-current-index', index);
            var titleEl = card.querySelector('.music-title');
            var artistEl = card.querySelector('.music-artist');
            var coverEl = card.querySelector('.music-cover');
            if (titleEl) titleEl.textContent = track.song || track.name || track.title || '音乐推荐';
            if (artistEl) artistEl.textContent = track.singer || track.artist || track.author || '未知歌手';
            if (coverEl) {
                var cover = track.cover || track.pic || track.image || track.poster || '';
                if (cover) {
                    coverEl.innerHTML = '<img src="' + escapeHtml(cover) + '" alt="' + escapeHtml(track.song || track.name || track.title || '') + '">';
                } else {
                    coverEl.innerHTML = '<div class="music-cover-fallback">♪</div>';
                }
            }
            resetMusicCardPlayback(audio);
            var playBtn = card.querySelector('.music-play-btn');
            if (playBtn) {
                toggleMusicCardPlayback(playBtn);
            }
        }

        function initMusicProgressBars() {
            document.addEventListener('click', function(e) {
                var progressBar = e.target.closest('.music-progress-bar');
                if (!progressBar) return;
                var card = progressBar.closest('.music-card');
                var audio = card ? card.querySelector('.music-audio') : null;
                if (!audio || !audio.duration) return;
                var rect = progressBar.getBoundingClientRect();
                var clickX = e.clientX - rect.left;
                var percent = clickX / rect.width;
                audio.currentTime = percent * audio.duration;
            });
        }
