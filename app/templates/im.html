                } else if (relationStatus === 'pending_outgoing') {
                    relationLabel = '等待对方同意';
                    actionHtml = '<button class="mini-btn muted" type="button" disabled>已发送申请</button>';
                } else if (relationStatus === 'pending_incoming') {
                    relationLabel = '对方已申请你';
                    actionHtml = '' +
                        '<button class="mini-btn" type="button" onclick="approveFriendRequest(' + item.id + ')">同意</button>' +
                        '<button class="mini-btn danger" type="button" onclick="rejectFriendRequest(' + item.id + ')">拒绝</button>';
                }
                return '' +
                    '<div class="search-item">' +
                        '<div class="list-item-row">' +
                            renderAvatarNode(item.avatar_url, item.username, 'list-avatar') +
                            '<div class="item-body">' +
                                '<div class="item-title"><div class="item-title-main"><span class="item-name-text">' + escapeHtml(item.username) + '</span></div><div class="item-title-side"><span class="item-meta">' + escapeHtml(relationLabel) + '</span></div></div>' +
                                '<div class="mini-btn-row">' +
                                    actionHtml +
                                '</div>' +
                            '</div>' +
                        '</div>' +
                    '</div>';
            }).join('');
        }

        function renderGroupOptions() {
            document.getElementById('groupFriendChecks').innerHTML = state.friends.map(function (item) {
                return '<label class="check-item"><input type="checkbox" value="' + item.id + '" class="group-friend-check" onchange="updateGroupFriendSummary()"><span>' + escapeHtml(item.username) + '</span></label>';
            }).join('');
            document.getElementById('groupEmployeeChecks').innerHTML = state.employees.map(function (item) {
                return '<label class="check-item"><input type="checkbox" value="' + item.id + '" class="group-employee-check"><span>@' + escapeHtml(item.alias) + '</span></label>';
            }).join('');
            updateGroupFriendSummary();
        }

        function toggleGroupFriendDropdown(forceState) {
            var dropdown = document.getElementById('groupFriendDropdown');
            if (!dropdown) {
                return;
            }
            var shouldOpen = typeof forceState === 'boolean' ? forceState : !dropdown.classList.contains('active');
            dropdown.classList.toggle('active', shouldOpen);
        }

        function closeGroupFriendDropdown() {
            toggleGroupFriendDropdown(false);
        }

        function updateGroupFriendSummary() {
            var summary = document.getElementById('groupFriendSummary');
            if (!summary) {
                return;
            }
            var checkedNodes = Array.prototype.slice.call(document.querySelectorAll('.group-friend-check:checked'));
            if (!checkedNodes.length) {
                summary.textContent = '请选择好友成员';
                summary.classList.add('placeholder');
                return;
            }
            var names = checkedNodes.map(function (node) {
                var textNode = node.parentNode ? node.parentNode.querySelector('span') : null;
                return textNode ? textNode.textContent.trim() : '';
            }).filter(Boolean);
            if (names.length <= 2) {
                summary.textContent = names.join('、');
            } else {
                summary.textContent = '已选择 ' + names.length + ' 位好友';
            }
            summary.classList.remove('placeholder');
        }

        function renderMembers(members) {
            var memberButton = document.getElementById('memberToggleBtn');
            var settingsButton = document.getElementById('groupSettingsBtn');
            var deleteChatBtn = document.getElementById('deleteChatBtn');
            var list = document.getElementById('memberPopoverList');
            var title = document.querySelector('.member-popover-title');
            var isGroup = state.currentConversation && state.currentConversation.chat_type === 'group';
            var isEmployee = state.currentConversation && state.currentConversation.chat_type === 'employee';
            var isPrivate = state.currentConversation && state.currentConversation.chat_type === 'private';
            if (!memberButton || !list || !title) {
                renderMentionTools();
                return;
            }
            if (!isGroup || !members || !members.length) {
                memberButton.style.display = 'none';
                settingsButton.style.display = 'none';
                // 非群聊会话显示删除聊天记录按钮
                deleteChatBtn.style.display = (isEmployee || isPrivate) ? 'inline-flex' : 'none';
                list.innerHTML = '';
                title.textContent = '群成员';
                closeMemberPopover();
                closeGroupSettings();
                renderMentionTools();
                return;
            }
            memberButton.style.display = 'inline-flex';
            settingsButton.style.display = 'inline-flex';
            deleteChatBtn.style.display = 'none'; // 群聊通过群设置弹窗删除
            title.textContent = '群成员（' + members.length + '）';
            list.innerHTML = members.map(function (item) {
                var suffix = item.member_type === 'employee' ? ' · 数字员工' : '';
                return '<div class="member-popover-item">' + escapeHtml((item.name || '成员') + suffix) + '</div>';
            }).join('');
            renderMentionTools();
        }

        function renderMessages(isNewMessage) {
            console.log('[Weather-Debug] renderMessages called');
            var container = document.getElementById('messageList');
            if (!state.currentConversation) {
                container.innerHTML = '<div class="empty-chat"><div style="font-size:22px;font-weight:800;margin-bottom:8px;">请选择一个会话</div></div>';
                return;
            }
            if (!state.currentMessages.length) {
                container.innerHTML = '<div class="empty-chat"><div style="font-size:18px;font-weight:800;margin-bottom:8px;">还没有消息</div><div>发送第一条消息，开始聊天。</div></div>';
                return;
            }
            var htmlParts = [];
            var weatherCardsToLoad = [];

            state.currentMessages.forEach(function (item, index) {
                var previous = index > 0 ? state.currentMessages[index - 1] : null;
                var isSelf = item.sender_type === 'user' && item.sender_name === state.currentUser.username;
                var isGroupChat = state.currentConversation && state.currentConversation.chat_type === 'group';
                var showSenderLine = !!isGroupChat && !isSelf;

                var weatherCardData = null;
                if (item.extra) {
                    if (item.extra.weather_card) {
                        weatherCardData = item.extra.weather_card;
                    } else if (item.extra.payload && typeof item.extra.payload === 'object') {
                        if (item.extra.payload.data && isWeatherCardPayload(item.extra.payload.data)) {
                            weatherCardData = item.extra.payload.data;
                        } else if (isWeatherCardPayload(item.extra.payload)) {
                            weatherCardData = item.extra.payload;
                        }
                    }
                }

                if (weatherCardData) {
                    console.log('[Weather-Debug] Found weather card at index', index, ':', weatherCardData.city, weatherCardData.weather);
                    var divider = shouldShowMessageDivider(previous, item)
                        ? '<div class="message-time-divider">' + escapeHtml(formatMessageDividerTime(item.create_at || '')) + '</div>'
                        : '';
                    var cardHtml = renderWeatherCard(weatherCardData);
                    var weatherRowIndex = weatherCardsToLoad.length;
                    var weatherRowHtml = divider +
                        '<div class="message-row weather-card-row" data-weather-index="' + weatherRowIndex + '">' +
                            '<div class="weather-card-standalone">' + cardHtml + '</div>' +
                        '</div>';
                    htmlParts.push(weatherRowHtml);

                    var city = weatherCardData.city || weatherCardData.province || '天气';
                    weatherCardsToLoad.push({
                        city: city,
                        weatherText: weatherCardData.weather || weatherCardData.text || '天气未知',
                        spots: getCitySpots(city)
                    });
                    console.log('[Weather-Debug] Added to load queue:', city, '| Total:', weatherCardsToLoad.length);
                    return;
                }

                var bubbleContent = renderMessageBubble(item);
                var isMusic = bubbleContent.indexOf('music-card') >= 0;
                var otherAvatarUrl = item.sender_avatar_url || '';
                if (!otherAvatarUrl && state.currentConversation && state.currentConversation.chat_type === 'private') {
                    otherAvatarUrl = state.currentConversation.target_avatar_url || '';
                }
                var otherAvatar = renderAvatarNode(otherAvatarUrl, item.sender_name || state.currentConversation.display_name || 'U', 'avatar');
                var selfAvatar = renderAvatarNode(state.currentUser.avatar_url, state.currentUser.username || '我', 'avatar');
                var divider = shouldShowMessageDivider(previous, item)
                    ? '<div class="message-time-divider">' + escapeHtml(formatMessageDividerTime(item.create_at || '')) + '</div>'
                    : '';
                var messageContent = item.content_text || '';
                var messageHtml = divider +
                    '<div class="message-row' + (isSelf ? ' self' : '') + (isMusic ? ' music-message' : '') + '">' +
                        (isSelf ? '' : otherAvatar) +
                        '<div class="message-main' + (isMusic ? ' music-message-main' : '') + '">' +
                            '<div class="sender-line' + (showSenderLine ? '' : ' hidden') + (isMusic ? ' music-sender-hidden' : '') + '">' + escapeHtml(item.sender_name || '未知') + '</div>' +
                            bubbleContent +
                            '<div class="message-actions">' +
                                '<button class="message-action-btn" title="复制" onclick="copyMessage(this)" data-content="' + escapeAttr(messageContent) + '">' +
                                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>' +
                                '</button>' +
                                '<button class="message-action-btn" title="删除" onclick="deleteMessage(this)">' +
                                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>' +
                                '</button>' +
                            '</div>' +
                        '</div>' +
                        (isSelf ? selfAvatar : '') +
                    '</div>';
                htmlParts.push(messageHtml);
            });

            container.innerHTML = htmlParts.join('');
            container.scrollTop = container.scrollHeight;

            console.log('[Weather-Debug] Total weather cards to process:', weatherCardsToLoad.length);
            if (weatherCardsToLoad.length > 0) {
                setTimeout(function() {
                    console.log('[Weather-Debug] Processing', weatherCardsToLoad.length, 'weather cards...');
                    
                    weatherCardsToLoad.forEach(function(cardInfo, index) {
                        var weatherRow = container.querySelector('.weather-card-row[data-weather-index="' + index + '"]');
                        
                        if (weatherRow) {
                            var cardContainer = weatherRow.querySelector('.weather-card-standalone');
                            
                            if (cardContainer) {
                                fetchWeatherImage(cardContainer, cardInfo.city, cardInfo.weatherText, cardInfo.spots);
                            }
                        }
                    });
                }, 200);
            }
        }

        function applyBootstrapData(data) {
            state.currentUser = data.user;
            state.conversations = data.conversations || [];
            state.friends = data.friends || [];
            state.friendRequests = data.friend_requests || { incoming: [], outgoing: [] };
            state.employees = data.employees || [];
            state.unreadTotal = Number(data.unread_total || 0);
            sortConversations();
            renderFriendRequestDot();
            renderConversations();
            renderFriends();
            renderFriendRequestPanels();
            renderGroups();
            renderEmployees();
            renderCurrentUserCard();
            updateMiddleSearchUI();
        }

        function applyConversationDetail(data, silent) {
            state.currentConversation = data.conversation;
            state.currentMessages = data.messages || [];
            state.currentMembers = data.members || [];
            document.getElementById('chatTitle').textContent = getConversationDisplayName(state.currentConversation) || '未命名会话';
            renderMembers(state.currentMembers);
            renderMessages(false);
            renderConversations();
            applyWeatherMode();
            renderMentionTools();
            if (!silent) {
                setStatus('已打开会话：' + (state.currentConversation.display_name || ''));
            }
        }

        async function refreshBootstrap(silent) {
            if (!silent) {
                setStatus('正在加载聊天数据...');
            }
            var resp = await apiGet('bootstrap', {});
            if (resp.code !== 0) {
                if (!silent) {
                    setStatus(resp.msg || '加载失败');
                }
                return;
            }
            applyBootstrapData(resp.data);
            if (state.currentConversation) {
                var keep = state.conversations.find(function (item) { return item.id === state.currentConversation.id; });
                if (keep) {
                    await openConversation(keep.id, true);
                } else {
                    state.currentConversation = null;
                    state.currentMessages = [];
                    state.currentMembers = [];
                    renderMembers([]);
                    renderMessages(false);
                    applyWeatherMode();
                    renderMentionTools();
                }
            }
            if (!silent) {
                setStatus('聊天数据已同步');
            }
        }

        async function openConversation(conversationId, silent) {
            var resp = await apiGet('detail', { conversation_id: conversationId });
            if (resp.code !== 0) {
                renderOpenErrorState(resp.msg || '加载会话失败');
                setStatus(resp.msg || '加载会话失败');
                return;
            }
            applyConversationDetail(resp.data, silent);
        }

        async function openPrivateConversation(userId) {
            activateTab('sessions');
            renderLoadingState('正在打开私聊...', '正在从通讯录进入聊天会话，请稍候。');
            setStatus('正在打开私聊...');
            var resp = await apiGet('open_private', { target_user_id: userId });
            if (resp.code !== 0) {
                setStatus(resp.msg || '打开私聊失败');
                return;
            }
            mergeConversation(resp.data);
            await openConversation(resp.data.id);
        }

        async function openEmployeeConversation(employeeId) {
            activateTab('sessions');
            renderLoadingState('正在打开数字员工会话...', '正在连接数字员工并同步聊天记录。');
            setStatus('正在打开数字员工会话...');
            var resp = await apiGet('open_employee', { employee_id: employeeId });
            if (resp.code !== 0) {
                setStatus(resp.msg || '打开数字员工会话失败');
                return;
            }
            mergeConversation(resp.data);
            await openConversation(resp.data.id);
        }

        async function handleMiddleSearch() {
            if (state.searchMode === 'discover') {
                await searchUsers();
                return;
            }
            if (state.currentTab === 'sessions') {
                renderConversations();
            } else if (state.currentTab === 'friends') {
                renderFriends();
            } else if (state.currentTab === 'requests') {
                renderFriendRequestPanels();
            } else if (state.currentTab === 'groups') {
                renderGroups();
            } else if (state.currentTab === 'employees') {
                renderEmployees();
            }
        }

        async function searchUsers() {
            var keyword = document.getElementById('userSearchInput').value.trim();
            if (!keyword) {
                openAddFriendPanel();
                renderSearchResult([]);
                return;
            }
            setStatus('正在搜索用户...');
            var resp = await apiGet('search_users', { keyword: keyword });
            if (resp.code !== 0) {
                setStatus(resp.msg || '搜索失败');
                return;
            }
            openAddFriendPanel();
            renderSearchResult(resp.data || []);
            setStatus('搜索完成');
        }

        async function addFriend(userId) {
            var resp = await apiPost('add_friend', { target_user_id: userId });
            setStatus(resp.msg || (resp.code === 0 ? '申请已发送' : '发送申请失败'));
            if (resp.code === 0) {
                await refreshBootstrap();
                searchUsers();
            }
        }

        async function approveFriendRequest(userId) {
            var resp = await apiPost('approve_friend', { requester_user_id: userId });
            setStatus(resp.msg || (resp.code === 0 ? '已同意好友申请' : '处理失败'));
            if (resp.code === 0) {
                await refreshBootstrap();
                if (state.currentTab === 'discover') {
                    searchUsers();
                }
            }
        }

        async function rejectFriendRequest(userId) {
            var resp = await apiPost('reject_friend', { requester_user_id: userId });
            setStatus(resp.msg || (resp.code === 0 ? '已拒绝好友申请' : '处理失败'));
            if (resp.code === 0) {
                await refreshBootstrap();
                if (state.currentTab === 'discover') {
                    searchUsers();
                }
            }
        }

        async function removeFriend(userId) {
            if (!window.confirm('确认删除这个好友吗？')) {
                return;
            }
            var resp = await apiPost('remove_friend', { friend_user_id: userId });
            setStatus(resp.msg || (resp.code === 0 ? '已删除好友' : '删除好友失败'));
            if (resp.code === 0) {
                await refreshBootstrap();
                if (state.currentTab === 'discover') {
                    searchUsers();
                }
            }
        }

        function showGroupModal() {
            renderGroupOptions();
            closeGroupFriendDropdown();
            document.getElementById('groupModal').classList.add('active');
        }

        function hideGroupModal() {
            closeGroupFriendDropdown();
            document.getElementById('groupModal').classList.remove('active');
        }

        async function submitCreateGroup() {
            var name = document.getElementById('groupNameInput').value.trim();
            var memberUserIds = Array.prototype.slice.call(document.querySelectorAll('.group-friend-check:checked')).map(function (node) { return node.value; }).join(',');
            var memberEmployeeIds = Array.prototype.slice.call(document.querySelectorAll('.group-employee-check:checked')).map(function (node) { return node.value; }).join(',');
            var resp = await apiPost('create_group', {
                name: name,
                member_user_ids: memberUserIds,
                member_employee_ids: memberEmployeeIds
            });
            setStatus(resp.msg || (resp.code === 0 ? '群聊创建成功' : '群聊创建失败'));
            if (resp.code === 0 && resp.data) {
                hideGroupModal();
                document.getElementById('groupNameInput').value = '';
                await refreshBootstrap();
                await openConversation(resp.data.id);
            }
        }

        async function refreshCurrentConversation() {
            if (!state.currentConversation) {
                return;
            }
            await openConversation(state.currentConversation.id, true);
        }

        async function syncChatState() {
            if (state.syncInProgress) {
                return;
            }
            state.syncInProgress = true;
            try {
                await refreshBootstrap(true);
                state.lastSyncAt = Date.now();
            } finally {
                state.syncInProgress = false;
            }
        }

        function disconnectIMStream() {
            if (state.eventSource) {
                state.eventSource.close();
                state.eventSource = null;
            }
            state.streamConnected = false;
        }

        function connectIMStream() {
            if (state.eventSource || !window.EventSource) {
                return;
            }
            var source = new EventSource('/api/im/stream');
            state.eventSource = source;
            source.onopen = function () {
                state.streamConnected = true;
                setStatus('实时消息通道已连接');
            };
            source.onmessage = function (event) {
                try {
                    var payload = JSON.parse(event.data || '{}');
                    if (payload.type === 'update') {
                        syncChatState();
                    }
                } catch (err) {
                    console.error(err);
                }
            };
            source.onerror = function () {
                disconnectIMStream();
            };
        }

        async function sendTextMessage() {
            if (!state.currentConversation) {
                setStatus('请先选择一个会话');
                return;
            }
            var input = document.getElementById('messageInput');
            var text = input.value.trim();
            if (!text) {
                setStatus('请输入消息内容');
                return;
            }
            setStatus('正在发送消息...');
            var resp = await apiPost('send_message', {
                conversation_id: state.currentConversation.id,
                content_type: 'text',
                content_text: text,
                extra_json: '{}'
            });
            if (resp.code !== 0) {
                setStatus(resp.msg || '发送失败');
                return;
            }
            input.value = '';
            state.currentMessages = state.currentMessages.concat(resp.data.messages || []);
            state.currentConversation = resp.data.conversation || state.currentConversation;
            mergeConversation(state.currentConversation);
            renderMessages(true);
            renderConversations();
            applyWeatherMode();
            if (resp.data && resp.data.employee_pending) {
                setStatus('消息已发送，@' + (resp.data.pending_employee_alias || '数字员工') + ' 正在处理中...');
            } else {
                setStatus('消息已发送');
            }
        }

        async function uploadChatFile(input) {
            if (!state.currentConversation) {
                setStatus('请先选择一个会话');
                input.value = '';
                return;
            }
            if (!input.files || !input.files.length) {
                return;
            }
            var formData = new FormData();
            formData.append('_xsrf', getXsrfToken());
            formData.append('file', input.files[0]);
            setStatus('正在上传文件...');
            var resp = await fetch('/api/im/upload', {
                method: 'POST',
                credentials: 'same-origin',
                body: formData
            }).then(function (r) { return r.json(); });
            if (resp.code !== 0) {
                setStatus(resp.msg || '文件上传失败');
                input.value = '';
                return;
            }
            var sendResp = await apiPost('send_message', {
                conversation_id: state.currentConversation.id,
                content_type: 'file',
                content_text: resp.data.file_name,
                file_id: resp.data.file_id,
                extra_json: JSON.stringify(resp.data)
            });
            input.value = '';
            if (sendResp.code !== 0) {
                setStatus(sendResp.msg || '文件消息发送失败');
                return;
            }
            state.currentMessages = state.currentMessages.concat(sendResp.data.messages || []);
            state.currentConversation = sendResp.data.conversation || state.currentConversation;
            mergeConversation(state.currentConversation);
            renderMessages(true);
            renderConversations();
            if (sendResp.data && sendResp.data.employee_pending) {
                setStatus('文件已发送，@' + (sendResp.data.pending_employee_alias || '数字员工') + ' 正在处理中...');
            } else {
                setStatus('文件已发送');
            }
        }

        document.getElementById('messageInput').addEventListener('keydown', function (event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendTextMessage();
            }
        });

        document.getElementById('userSearchInput').addEventListener('keydown', function (event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                handleMiddleSearch();
            }
        });
        document.getElementById('userSearchInput').addEventListener('input', function () {
            if (state.searchMode !== 'discover') {
                handleMiddleSearch();
            }
        });
        document.addEventListener('click', function (event) {
            var menu = document.querySelector('.plus-menu');
            if (menu && !menu.contains(event.target)) {
                closePlusMenu();
            }
            var friendDropdown = document.getElementById('groupFriendDropdown');
            if (friendDropdown && !friendDropdown.contains(event.target)) {
                closeGroupFriendDropdown();
            }
            var memberActions = document.querySelector('.chat-head-actions');
            if (memberActions && !memberActions.contains(event.target)) {
                closeMemberPopover();
            }
        });

        renderEmojiPanel();
        renderMentionTools();
        updateMiddleSearchUI();
        refreshBootstrap();
        initMusicProgressBars();
        connectIMStream();
        document.addEventListener('visibilitychange', function () {
            if (document.hidden) {
                disconnectIMStream();
            } else {
                connectIMStream();
                syncChatState();
            }
        });
        setInterval(function () {
            if (!document.hidden && !state.streamConnected) {
                syncChatState();
            }
        }, 4000);
    </script>
