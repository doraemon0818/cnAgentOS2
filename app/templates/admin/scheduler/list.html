<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <link rel="stylesheet" href="/static/layui/layui-v2.13.6/layui/css/layui.css">
    <style>
        :root {
            --glow-green: #00f7ff;
            --glow-cyan: #13d4ff;
            --glow-green-soft: rgba(0, 247, 255, 0.15);
            --glow-cyan-soft: rgba(19, 212, 255, 0.1);
            --bg-primary: #02101d;
            --bg-secondary: #041a2a;
            --bg-panel: rgba(6, 24, 38, 0.82);
            --border-color: rgba(30, 228, 255, 0.2);
            --border-strong: rgba(34, 245, 255, 0.42);
            --text-primary: #ecfcff;
            --text-secondary: #b7dbe5;
            --text-muted: #79aebb;
        }
        
        body {
            background:
                radial-gradient(circle at top left, rgba(0, 247, 255, 0.16), transparent 24%),
                radial-gradient(circle at top right, rgba(19, 212, 255, 0.1), transparent 22%),
                radial-gradient(circle at bottom center, rgba(0, 180, 255, 0.08), transparent 20%),
                linear-gradient(180deg, #02101d 0%, #031726 48%, #041a2a 100%) !important;
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(rgba(25, 236, 255, 0.045) 1px, transparent 1px),
                linear-gradient(90deg, rgba(25, 236, 255, 0.045) 1px, transparent 1px);
            background-size: 30px 30px;
            mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.5), transparent 86%);
        }
        
        .page-container {padding: 20px; position: relative; z-index: 1;}
        
        .stats-panel {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 24px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 18px 48px rgba(0, 7, 15, 0.42), 0 0 0 1px rgba(20, 224, 255, 0.08);
            backdrop-filter: blur(14px);
        }
        
        .stats-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(109, 124, 255, 0.22), rgba(53, 214, 255, 0.06) 55%, rgba(255, 255, 255, 0));
            pointer-events: none;
        }
        
        .stats-panel::after {
            content: "";
            position: absolute;
            inset: 10px;
            border: 1px solid rgba(0, 247, 255, 0.06);
            border-radius: inherit;
            pointer-events: none;
        }
        
        .stats-panel h2 {
            margin: 0;
            font-size: 24px;
            color: var(--text-primary);
            position: relative;
            z-index: 1;
            text-shadow: 0 0 10px rgba(0, 247, 255, 0.25);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 20px;
            position: relative;
            z-index: 1;
        }
        
        .stat-item {
            text-align: center;
            padding: 16px;
            background: rgba(6, 24, 38, 0.6);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .stat-item::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, var(--glow-cyan-soft) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .stat-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 247, 255, 0.15), 0 0 16px rgba(0, 247, 255, 0.08);
            border-color: var(--border-strong);
        }
        
        .stat-item:hover::before {
            opacity: 1;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(135deg, var(--glow-green), var(--glow-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            z-index: 1;
        }
        
        .stat-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 8px;
            position: relative;
            z-index: 1;
        }
        
        .task-card {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 24px;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 18px 48px rgba(0, 7, 15, 0.42), 0 0 0 1px rgba(20, 224, 255, 0.08);
            backdrop-filter: blur(14px);
        }
        
        .task-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: linear-gradient(180deg, var(--glow-green), var(--glow-cyan));
            box-shadow: 0 0 12px rgba(0, 247, 255, 0.4);
        }
        
        .task-card::after {
            content: "";
            position: absolute;
            inset: 10px;
            border: 1px solid rgba(0, 247, 255, 0.06);
            border-radius: inherit;
            pointer-events: none;
        }
        
        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 247, 255, 0.15), 0 0 20px rgba(0, 247, 255, 0.08);
            border-color: var(--border-strong);
        }
        
        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
        }
        
        .task-name {
            font-size: 18px;
            font-weight: bold;
            color: var(--text-primary);
            text-shadow: 0 0 8px rgba(0, 247, 255, 0.15);
        }
        
        .task-status {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .status-enabled {
            background: linear-gradient(135deg, rgba(50, 210, 150, 0.25), rgba(55, 220, 168, 0.15));
            color: #32d296;
            border: 1px solid rgba(50, 210, 150, 0.4);
            box-shadow: 0 0 8px rgba(50, 210, 150, 0.1);
        }
        
        .status-disabled {
            background: rgba(6, 24, 38, 0.6);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }
        
        .task-info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
        }
        
        .info-item {
            background: rgba(6, 24, 38, 0.7);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }
        
        .info-item:hover {
            border-color: var(--glow-green);
            background: rgba(0, 247, 255, 0.05);
            box-shadow: 0 0 8px rgba(0, 247, 255, 0.08);
        }
        
        .info-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 5px;
        }
        
        .info-value {
            font-size: 14px;
            color: var(--text-primary);
            font-weight: 500;
        }
        
        .task-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }
        
        .log-panel {
            margin-top: 20px;
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 24px;
            backdrop-filter: blur(14px);
        }
        
        .log-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .log-table th, .log-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        
        .log-table th {
            background: rgba(6, 24, 38, 0.8);
            font-weight: 500;
            color: var(--text-primary);
        }
        
        .log-table td {
            color: var(--text-secondary);
        }
        
        .status-success {color: #32d296;}
        .status-failed {color: #ff6b7a;}
        
        /* Glass-morphism buttons */
        .layui-btn {
            border-radius: 12px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }
        
        .layui-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transition: left 0.5s ease;
        }
        
        .layui-btn:hover::before {
            left: 100%;
        }
        
        .layui-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 247, 255, 0.2);
        }
        
        .layui-btn-normal {
            background: linear-gradient(135deg, rgba(0, 247, 255, 0.25), rgba(19, 212, 255, 0.15));
            border: 1px solid rgba(0, 247, 255, 0.4);
            color: var(--glow-green);
            box-shadow: 0 4px 16px rgba(0, 247, 255, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        
        .layui-btn-normal:hover {
            background: linear-gradient(135deg, rgba(0, 247, 255, 0.35), rgba(19, 212, 255, 0.25));
            border-color: var(--glow-green);
            box-shadow: 0 8px 24px rgba(0, 247, 255, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.15);
        }
        
        .layui-btn-danger {
            background: linear-gradient(135deg, rgba(255, 107, 122, 0.25), rgba(255, 79, 139, 0.15));
            border: 1px solid rgba(255, 107, 122, 0.4);
            color: #ff6b7a;
            box-shadow: 0 4px 16px rgba(255, 107, 122, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        
        .layui-btn-danger:hover {
            background: linear-gradient(135deg, rgba(255, 107, 122, 0.35), rgba(255, 79, 139, 0.25));
            border-color: #ff6b7a;
            box-shadow: 0 8px 24px rgba(255, 107, 122, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.15);
        }
        
        .layui-btn-warm {
            background: linear-gradient(135deg, rgba(255, 188, 94, 0.25), rgba(255, 122, 89, 0.15));
            border: 1px solid rgba(255, 188, 94, 0.4);
            color: #ffbc5e;
            box-shadow: 0 4px 16px rgba(255, 188, 94, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        
        .layui-btn-warm:hover {
            background: linear-gradient(135deg, rgba(255, 188, 94, 0.35), rgba(255, 122, 89, 0.25));
            border-color: #ffbc5e;
            box-shadow: 0 8px 24px rgba(255, 188, 94, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.15);
        }
        
        .layui-btn-primary {
            background: rgba(6, 24, 38, 0.6);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }
        
        .layui-btn-primary:hover {
            background: rgba(6, 24, 38, 0.8);
            border-color: var(--glow-green);
            color: var(--glow-green);
            box-shadow: 0 4px 16px rgba(0, 247, 255, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        
        /* 执行状态动画 */
        .execution-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .execution-status.running {
            background: linear-gradient(135deg, rgba(0, 247, 255, 0.25), rgba(19, 212, 255, 0.15));
            border: 1px solid rgba(0, 247, 255, 0.4);
            color: var(--glow-green);
            box-shadow: 0 0 12px rgba(0, 247, 255, 0.2);
        }
        
        .execution-status.success {
            background: linear-gradient(135deg, rgba(50, 210, 150, 0.25), rgba(55, 220, 168, 0.15));
            border: 1px solid rgba(50, 210, 150, 0.4);
            color: #32d296;
            box-shadow: 0 0 12px rgba(50, 210, 150, 0.2);
        }
        
        .execution-status.failed {
            background: linear-gradient(135deg, rgba(255, 107, 122, 0.25), rgba(255, 79, 139, 0.15));
            border: 1px solid rgba(255, 107, 122, 0.4);
            color: #ff6b7a;
            box-shadow: 0 0 12px rgba(255, 107, 122, 0.2);
        }
        
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .status-icon {
            width: 16px;
            height: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        
        .status-icon svg {
            width: 16px;
            height: 16px;
        }
        
        .checkmark {
            stroke-dasharray: 20;
            stroke-dashoffset: 20;
            animation: drawCheck 0.3s ease forwards;
        }
        
        @keyframes drawCheck {
            to { stroke-dashoffset: 0; }
        }
        
        .cross {
            stroke-dasharray: 20;
            stroke-dashoffset: 20;
            animation: drawCross 0.3s ease forwards;
        }
        
        @keyframes drawCross {
            to { stroke-dashoffset: 0; }
        }
    </style>
</head>
<body>
<div class="page-container">
    <!-- 统计面板 -->
    <div class="stats-panel">
        <h2 style="margin: 0;">⏰ 定时任务管理</h2>
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-value" id="stat-total">0</div>
                <div class="stat-label">总任务数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-enabled">0</div>
                <div class="stat-label">运行中</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-runs">0</div>
                <div class="stat-label">总执行次数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-success-rate">0%</div>
                <div class="stat-label">成功率</div>
            </div>
        </div>
    </div>
    
    <!-- 操作按钮 -->
    <div style="margin-bottom: 20px;">
        <button class="layui-btn layui-btn-normal" onclick="showTaskModal()">
            <i class="layui-icon layui-icon-add-1"></i> 新建任务
        </button>
        <button class="layui-btn layui-btn-primary" onclick="loadTasks()">
            <i class="layui-icon layui-icon-refresh"></i> 刷新
        </button>
        <button class="layui-btn layui-btn-warm" onclick="showLogsPanel()">
            <i class="layui-icon layui-icon-log"></i> 查看日志
        </button>
    </div>
    
    <!-- 任务列表 -->
    <div id="task-list"></div>
</div>

<!-- 任务编辑弹窗 -->
<div id="task-modal" style="display: none;">
    <div style="padding: 20px; background: #02101d;">
        <form class="layui-form" lay-filter="task-form">
            <input type="hidden" name="task_id" id="task-id">
            
            <div class="layui-form-item">
                <label class="layui-form-label">任务名称</label>
                <div class="layui-input-block">
                    <input type="text" name="name" required lay-verify="required" 
                           placeholder="请输入任务名称" class="layui-input">
                </div>
            </div>
            
            <div class="layui-form-item">
                <label class="layui-form-label">任务类型</label>
                <div class="layui-input-block">
                    <select name="task_type" required>
                        <option value="">请选择任务类型</option>
                        <option value="surveillance_collect">瞭望采集</option>
                        <option value="deep_collect">AI 深度采集</option>
                    </select>
                </div>
            </div>
            
            <div class="layui-form-item">
                <label class="layui-form-label">Cron 表达式</label>
                <div class="layui-input-block">
                    <input type="text" name="cron_expression" required lay-verify="required" 
                           placeholder="例如：*/30 * * * * (每 30 分钟)" class="layui-input">
                    <div style="color: #79aebb; font-size: 12px; margin-top: 5px;">
                        格式：分钟 小时 日 月 星期
                    </div>
                </div>
            </div>
            
            <div class="layui-form-item">
                <label class="layui-form-label">任务配置</label>
                <div class="layui-input-block">
                    <textarea name="config" placeholder='JSON 格式配置，例如：{"keywords": ["AI"], "source_ids": [1], "pages": 1}' 
                              class="layui-textarea" rows="5"></textarea>
                </div>
            </div>
            
            <div class="layui-form-item">
                <label class="layui-form-label">启用状态</label>
                <div class="layui-input-block">
                    <input type="checkbox" name="enabled" lay-skin="switch" lay-text="启用|禁用" checked>
                </div>
            </div>
        </form>
    </div>
</div></function></seed:tool_call>

<script src="/static/layui/layui-v2.13.6/layui/layui.js"></script>
<script>
layui.use(['layer', 'form', 'table'], function() {
    var layer = layui.layer;
    var form = layui.form;
    var $ = layui.$;
    
    // 获取 XSRF token
    function getCookie(name) {
        var r = document.cookie.match("\\b" + name + "=([^;]*)\\b");
        return r ? r[1] : undefined;
    }
    
    var xsrfToken = getCookie("_xsrf");
    
    // 设置全局 AJAX 默认配置
    $.ajaxSetup({
        beforeSend: function(xhr) {
            xhr.setRequestHeader("X-XSRFToken", xsrfToken);
        }
    });
    
    // 加载任务列表
    function loadTasks() {
        $.get('/admin/scheduler/api?action=list', function(res) {
            if (res.code === 0) {
                renderTasks(res.data.tasks);
                updateStats(res.data.tasks);
            } else {
                layer.msg(res.msg, {icon: 2});
            }
        });
    }
    
    // 渲染任务列表
    function renderTasks(tasks) {
        var html = '';
        if (tasks.length === 0) {
            html = '<div style="text-align: center; padding: 40px; color: #79aebb;">暂无任务</div>';
        } else {
            tasks.forEach(function(task) {
                var statusClass = task.enabled ? 'status-enabled' : 'status-disabled';
                var statusText = task.enabled ? '运行中' : '已停止';
                
                html += `
                    <div class="task-card" id="task-card-${task.id}">
                        <div class="task-header">
                            <div class="task-name">${task.name}</div>
                            <div style="display: flex; gap: 8px; align-items: center;">
                                <span class="execution-status" id="exec-status-${task.id}" style="display: none;"></span>
                                <span class="task-status ${statusClass}">${statusText}</span>
                            </div>
                        </div>
                        <div class="task-info">
                            <div class="info-item">
                                <div class="info-label">任务类型</div>
                                <div class="info-value">${task.task_type}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">Cron 表达式</div>
                                <div class="info-value">${task.cron_expression}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">下次执行</div>
                                <div class="info-value">${task.next_run_time || '未安排'}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">运行次数</div>
                                <div class="info-value">${task.run_count}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">成功/失败</div>
                                <div class="info-value">${task.success_count} / ${task.fail_count}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">创建时间</div>
                                <div class="info-value">${task.created_at}</div>
                            </div>
                        </div>
                        <div class="task-actions">
                            <button class="layui-btn layui-btn-sm layui-btn-normal" onclick="editTask(${task.id})">
                                <i class="layui-icon layui-icon-edit"></i> 编辑
                            </button>
                            <button class="layui-btn layui-btn-sm layui-btn-warm" onclick="runNow(${task.id})">
                                <i class="layui-icon layui-icon-play"></i> 立即执行
                            </button>
                            <button class="layui-btn layui-btn-sm ${task.enabled ? 'layui-btn-danger' : 'layui-btn-primary'}" 
                                    onclick="toggleTask(${task.id})">
                                <i class="layui-icon layui-icon-${task.enabled ? 'close' : 'release'}"></i> 
                                ${task.enabled ? '停止' : '启动'}
                            </button>
                            <button class="layui-btn layui-btn-sm layui-btn-primary" onclick="viewLogs(${task.id})">
                                <i class="layui-icon layui-icon-log"></i> 日志
                            </button>
                            <button class="layui-btn layui-btn-sm layui-btn-danger" onclick="deleteTask(${task.id})">
                                <i class="layui-icon layui-icon-delete"></i> 删除
                            </button>
                        </div>
                    </div>
                `;
            });
        }
        $('#task-list').html(html);
    }
    
    // 更新统计
    function updateStats(tasks) {
        var total = tasks.length;
        var enabled = tasks.filter(t => t.enabled).length;
        var runs = tasks.reduce((sum, t) => sum + t.run_count, 0);
        var success = tasks.reduce((sum, t) => sum + t.success_count, 0);
        var rate = runs > 0 ? Math.round(success / runs * 100) : 0;
        
        $('#stat-total').text(total);
        $('#stat-enabled').text(enabled);
        $('#stat-runs').text(runs);
        $('#stat-success-rate').text(rate + '%');
    }
    
    // 显示任务编辑弹窗
    window.showTaskModal = function(taskId) {
        var title = taskId ? '编辑任务' : '新建任务';
        
        layer.open({
            type: 1,
            title: title,
            area: ['600px', '550px'],
            content: $('#task-modal').html(),
            btn: ['确定', '取消'],
            yes: function(index) {
                var formData = {
                    action: taskId ? 'update' : 'create',
                    name: $('[name="name"]').val(),
                    task_type: $('[name="task_type"]').val(),
                    cron_expression: $('[name="cron_expression"]').val(),
                    config: $('[name="config"]').val(),
                    enabled: $('[name="enabled"]').is(':checked') ? 1 : 0
                };
                
                if (taskId) {
                    formData.task_id = taskId;
                }
                
                $.post('/admin/scheduler/api', formData, function(res) {
                    if (res.code === 0) {
                        layer.msg(res.msg, {icon: 1});
                        layer.close(index);
                        loadTasks();
                    } else {
                        layer.msg(res.msg, {icon: 2});
                    }
                });
            }
        });
        
        form.render();
        
        if (taskId) {
            $.get('/admin/scheduler/api?action=info&task_id=' + taskId, function(res) {
                if (res.code === 0) {
                    var task = res.data;
                    $('[name="name"]').val(task.name);
                    $('[name="task_type"]').val(task.task_type);
                    $('[name="cron_expression"]').val(task.cron_expression);
                    $('[name="config"]').val(JSON.stringify(task.config, null, 2));
                    $('[name="enabled"]').prop('checked', task.enabled);
                    form.render();
                }
            });
        }
    };
    
    window.editTask = function(taskId) {
        showTaskModal(taskId);
    };
    
    window.runNow = function(taskId) {
        // 显示执行中状态
        var statusEl = $('#exec-status-' + taskId);
        statusEl.show().removeClass('success failed').addClass('running')
            .html('<span class="spinner"></span> 执行中...');
        
        $.post('/admin/scheduler/api', {
            action: 'run_now',
            task_id: taskId
        }, function(res) {
            if (res.code === 0) {
                // 执行成功，显示勾勾
                statusEl.removeClass('running').addClass('success')
                    .html('<span class="status-icon"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path class="checkmark" d="M3 8l4 4 6-8"/></svg></span> 成功');
                setTimeout(function() {
                    statusEl.fadeOut(300);
                }, 3000);
                loadTasks();
            } else {
                // 执行失败，显示叉叉
                statusEl.removeClass('running').addClass('failed')
                    .html('<span class="status-icon"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path class="cross" d="M4 4l8 8M12 4l-8 8"/></svg></span> 失败');
                setTimeout(function() {
                    statusEl.fadeOut(300);
                }, 3000);
            }
        }).fail(function() {
            statusEl.removeClass('running').addClass('failed')
                .html('<span class="status-icon"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path class="cross" d="M4 4l8 8M12 4l-8 8"/></svg></span> 失败');
            setTimeout(function() {
                statusEl.fadeOut(300);
            }, 3000);
        });
    };
    
    window.toggleTask = function(taskId) {
        $.post('/admin/scheduler/api', {
            action: 'toggle',
            task_id: taskId
        }, function(res) {
            if (res.code === 0) {
                layer.msg(res.msg, {icon: 1});
                loadTasks();
            } else {
                layer.msg(res.msg, {icon: 2});
            }
        });
    };
    
    window.deleteTask = function(taskId) {
        layer.confirm('确定删除此任务吗？', function(index) {
            $.post('/admin/scheduler/api', {
                action: 'delete',
                task_id: taskId
            }, function(res) {
                if (res.code === 0) {
                    layer.msg(res.msg, {icon: 1});
                    loadTasks();
                } else {
                    layer.msg(res.msg, {icon: 2});
                }
                layer.close(index);
            });
        });
    };
    
    window.viewLogs = function(taskId) {
        $.get('/admin/scheduler/api?action=logs&task_id=' + taskId, function(res) {
            if (res.code === 0) {
                showLogsPanel(res.data.logs);
            }
        });
    };
    
    window.showLogsPanel = function(logs) {
        if (!logs) {
            $.get('/admin/scheduler/api?action=logs', function(res) {
                if (res.code === 0) {
                    showLogsPanel(res.data.logs);
                }
            });
            return;
        }
        
        var html = '<table class="log-table"><thead><tr>' +
                   '<th>任务名称</th><th>状态</th><th>消息</th><th>开始时间</th><th>耗时</th>' +
                   '</tr></thead><tbody>';
        
        logs.forEach(function(log) {
            var statusClass = log.status === 'success' ? 'status-success' : 'status-failed';
            html += `<tr>
                <td>${log.task_name}</td>
                <td class="${statusClass}">${log.status}</td>
                <td>${log.message}</td>
                <td>${log.start_time}</td>
                <td>${log.duration_seconds.toFixed(2)}s</td>
            </tr>`;
        });
        
        html += '</tbody></table>';
        
        layer.open({
            type: 1,
            title: '任务日志',
            area: ['900px', '500px'],
            content: '<div style="padding: 20px; background: #02101d;">' + html + '</div>'
        });
    };
    
    // 初始化
    loadTasks();
});
</script>
</body>
</html>
