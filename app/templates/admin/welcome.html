<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎页</title>
    <link rel="stylesheet" href="{{ static_url('layui/layui-v2.13.6/layui/css/layui.css') }}">
    <link rel="stylesheet" href="{{ static_url('fontawesome/fontawesome-free-5.15.4-web/css/all.min.css') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f2f2f2;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .welcome-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
        }

        .welcome-header h2 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .welcome-header p {
            opacity: 0.9;
            font-size: 16px;
        }

        .stat-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #fff;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .stat-card .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #fff;
            margin-right: 20px;
            flex-shrink: 0;
        }

        .stat-card .stat-info h3 {
            font-size: 28px;
            color: #333;
            margin-bottom: 5px;
        }

        .stat-card .stat-info p {
            color: #999;
            font-size: 14px;
        }

        .bg-blue { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .bg-green { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .bg-orange { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .bg-purple { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }

        .info-card {
            background: #fff;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        .info-card h3 {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e6e6e6;
        }

        .info-card .layui-timeline {
            padding-left: 10px;
        }

        .quick-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .quick-link {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid #e6e6e6;
        }

        .quick-link:hover {
            background: #667eea;
            color: #fff;
            border-color: #667eea;
            transform: translateY(-3px);
        }

        .quick-link:hover i {
            color: #fff;
        }

        .quick-link i {
            font-size: 32px;
            color: #667eea;
            margin-bottom: 10px;
            transition: color 0.3s;
        }

        .quick-link span {
            display: block;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .stat-row {
                grid-template-columns: 1fr;
            }
            .quick-links {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
    <link rel="stylesheet" href="{{ static_url('css/admin-premium-dark.css') }}">
</head>
<body>
    <div class="welcome-header">
        <h2><i class="fas fa-hand-sparkles"></i> 欢迎使用 AI智能瞭望与智能问数系统</h2>
        <p>管理后台 - 专业、高效、智能的数据管理平台</p>
    </div>

    <div class="stat-row">
        <div class="stat-card">
            <div class="stat-icon bg-blue">
                <i class="fas fa-users"></i>
            </div>
            <div class="stat-info">
                <h3>--</h3>
                <p>用户总数</p>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon bg-green">
                <i class="fas fa-robot"></i>
            </div>
            <div class="stat-info">
                <h3>--</h3>
                <p>数字员工</p>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon bg-orange">
                <i class="fas fa-brain"></i>
            </div>
            <div class="stat-info">
                <h3>--</h3>
                <p>模型调用次数</p>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon bg-purple">
                <i class="fas fa-database"></i>
            </div>
            <div class="stat-info">
                <h3>--</h3>
                <p>数据源数量</p>
            </div>
        </div>
    </div>

    <div class="layui-row layui-col-space20">
        <div class="layui-col-md8">
            <div class="info-card">
                <h3><i class="fas fa-compass"></i> 快捷入口</h3>
                <div class="quick-links">
                    <div class="quick-link" data-url="/admin/user/list" data-title="用户列表">
                        <i class="fas fa-user-cog"></i>
                        <span>用户管理</span>
                    </div>
                    <div class="quick-link" data-url="/admin/role/list" data-title="角色管理">
                        <i class="fas fa-shield-alt"></i>
                        <span>角色管理</span>
                    </div>
                    <div class="quick-link" data-url="/admin/permission/list" data-title="权限管理">
                        <i class="fas fa-user-shield"></i>
                        <span>权限管理</span>
                    </div>
                    <div class="quick-link" data-url="/admin/function/list" data-title="功能管理">
                        <i class="fas fa-cogs"></i>
                        <span>功能管理</span>
                    </div>
                    <div class="quick-link" data-url="/admin/model/list" data-title="模型引擎">
                        <i class="fas fa-microchip"></i>
                        <span>模型引擎</span>
                    </div>
                    <div class="quick-link" data-url="/admin/surveillance/collect" data-title="瞭望采集">
                        <i class="fas fa-satellite"></i>
                        <span>瞭望管理</span>
                    </div>
                    <div class="quick-link" data-url="/admin/warehouse/list" data-title="数据仓库">
                        <i class="fas fa-warehouse"></i>
                        <span>数据仓库</span>
                    </div>
                    <div class="quick-link" data-url="/admin/interface/list" data-title="接口管理">
                        <i class="fas fa-plug"></i>
                        <span>接口管理</span>
                    </div>
                    <div class="quick-link" data-url="/admin/employee/list" data-title="数字员工">
                        <i class="fas fa-user-astronaut"></i>
                        <span>数字员工</span>
                    </div>
                    <div class="quick-link">
                        <i class="fas fa-chart-line"></i>
                        <span>数智大屏</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="layui-col-md4">
            <div class="info-card">
                <h3><i class="fas fa-info-circle"></i> 系统信息</h3>
                <table class="layui-table" lay-skin="line">
                    <tbody>
                        <tr>
                            <td style="width: 120px; color: #666;">系统名称</td>
                            <td>AI智能瞭望与智能问数系统</td>
                        </tr>
                        <tr>
                            <td style="color: #666;">系统版本</td>
                            <td>v0.1.0</td>
                        </tr>
                        <tr>
                            <td style="color: #666;">后端框架</td>
                            <td>Tornado 6.5.5</td>
                        </tr>
                        <tr>
                            <td style="color: #666;">前端框架</td>
                            <td>Layui 2.13.6</td>
                        </tr>
                        <tr>
                            <td style="color: #666;">数据库</td>
                            <td>SQLite3</td>
                        </tr>
                        <tr>
                            <td style="color: #666;">开发状态</td>
                            <td><span class="layui-badge layui-bg-green">开发中</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="{{ static_url('layui/layui-v2.13.6/layui/layui.js') }}"></script>
    <script>
        layui.use(['layer', 'jquery'], function(){
            var layer = layui.layer;
            var $ = layui.jquery;

            $('.quick-link').on('click', function(){
                var url = $(this).data('url');
                var title = $(this).data('title');
                if (url) {
                    if (parent.openAdminTab) {
                        parent.openAdminTab(url, title);
                    }
                } else {
                    layer.msg('功能开发中，敬请期待', {icon: 0});
                }
            });
        });
    </script>
</body>
</html>
