<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <link rel="stylesheet" href="/static/layui/layui-v2.13.6/layui/css/layui.css">
    <style>
        :root {
            --glow-green: #00f7ff;
            --glow-cyan: #13d4ff;
            --glow-green-soft: rgba(0, 247, 255, 0.15);
            --glow-cyan-soft: rgba(19, 212, 255, 0.1);
            --bg-primary: #02101d;
            --bg-secondary: #041a2a;
            --bg-panel: rgba(6, 24, 38, 0.82);
            --border-color: rgba(30, 228, 255, 0.2);
            --border-strong: rgba(34, 245, 255, 0.42);
            --text-primary: #ecfcff;
            --text-secondary: #b7dbe5;
            --text-muted: #79aebb;
        }
        
        body {
            background:
                radial-gradient(circle at top left, rgba(0, 247, 255, 0.16), transparent 24%),
                radial-gradient(circle at top right, rgba(19, 212, 255, 0.1), transparent 22%),
                radial-gradient(circle at bottom center, rgba(0, 180, 255, 0.08), transparent 20%),
                linear-gradient(180deg, #02101d 0%, #031726 48%, #041a2a 100%) !important;
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(rgba(25, 236, 255, 0.045) 1px, transparent 1px),
                linear-gradient(90deg, rgba(25, 236, 255, 0.045) 1px, transparent 1px);
            background-size: 30px 30px;
            mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.5), transparent 86%);
        }
        
        .page-container {padding: 20px; position: relative; z-index: 1;}
        
        .stats-panel {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 24px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 18px 48px rgba(0, 7, 15, 0.42), 0 0 0 1px rgba(20, 224, 255, 0.08);
            backdrop-filter: blur(14px);
        }
        
        .stats-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(109, 124, 255, 0.22), rgba(53, 214, 255, 0.06) 55%, rgba(255, 255, 255, 0));
            pointer-events: none;
        }
        
        .stats-panel::after {
            content: "";
            position: absolute;
            inset: 10px;
            border: 1px solid rgba(0, 247, 255, 0.06);
            border-radius: inherit;
            pointer-events: none;
        }
        
        .stats-panel h2 {
            margin: 0;
            font-size: 24px;
            color: var(--text-primary);
            position: relative;
            z-index: 1;
            text-shadow: 0 0 10px rgba(0, 247, 255, 0.25);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 20px;
            position: relative;
            z-index: 1;
        }
        
        .stat-item {
            text-align: center;
            padding: 16px;
            background: rgba(6, 24, 38, 0.6);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .stat-item::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, var(--glow-cyan-soft) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .stat-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 247, 255, 0.15), 0 0 16px rgba(0, 247, 255, 0.08);
            border-color: var(--border-strong);
        }
        
        .stat-item:hover::before {
            opacity: 1;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(135deg, var(--glow-green), var(--glow-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            z-index: 1;
        }
        
        .stat-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 8px;
            position: relative;
            z-index: 1;
        }
        
        .workflow-card {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 24px;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 18px 48px rgba(0, 7, 15, 0.42), 0 0 0 1px rgba(20, 224, 255, 0.08);
            backdrop-filter: blur(14px);
        }
        
        .workflow-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: linear-gradient(180deg, var(--glow-green), var(--glow-cyan));
            box-shadow: 0 0 12px rgba(0, 247, 255, 0.4);
        }
        
        .workflow-card::after {
            content: "";
            position: absolute;
            inset: 10px;
            border: 1px solid rgba(0, 247, 255, 0.06);
            border-radius: inherit;
            pointer-events: none;
        }
        
        .workflow-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 247, 255, 0.15), 0 0 20px rgba(0, 247, 255, 0.08);
            border-color: var(--border-strong);
        }
        
        .workflow-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
        }
        
        .workflow-name {
            font-size: 18px;
            font-weight: bold;
            color: var(--text-primary);
            text-shadow: 0 0 8px rgba(0, 247, 255, 0.15);
        }
        
        .workflow-type {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            background: linear-gradient(135deg, rgba(0, 247, 255, 0.15), rgba(19, 212, 255, 0.1));
            color: var(--glow-green);
            border: 1px solid rgba(0, 247, 255, 0.3);
            box-shadow: 0 0 8px rgba(0, 247, 255, 0.1);
        }
        
        .workflow-nodes {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
            position: relative;
            z-index: 1;
        }
        
        .node-item {
            background: rgba(6, 24, 38, 0.7);
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 13px;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            transition: all 0.2s ease;
        }
        
        .node-item:hover {
            border-color: var(--glow-green);
            background: rgba(0, 247, 255, 0.08);
            box-shadow: 0 0 8px rgba(0, 247, 255, 0.1);
        }
        
        /* Glass-morphism buttons */
        .layui-btn {
            border-radius: 12px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }
        
        .layui-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transition: left 0.5s ease;
        }
        
        .layui-btn:hover::before {
            left: 100%;
        }
        
        .layui-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 247, 255, 0.2);
        }
        
        .layui-btn-normal {
            background: linear-gradient(135deg, rgba(0, 247, 255, 0.25), rgba(19, 212, 255, 0.15));
            border: 1px solid rgba(0, 247, 255, 0.4);
            color: var(--glow-green);
            box-shadow: 0 4px 16px rgba(0, 247, 255, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        
        .layui-btn-normal:hover {
            background: linear-gradient(135deg, rgba(0, 247, 255, 0.35), rgba(19, 212, 255, 0.25));
            border-color: var(--glow-green);
            box-shadow: 0 8px 24px rgba(0, 247, 255, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.15);
        }
        
        .layui-btn-danger {
            background: linear-gradient(135deg, rgba(255, 107, 122, 0.25), rgba(255, 79, 139, 0.15));
            border: 1px solid rgba(255, 107, 122, 0.4);
            color: #ff6b7a;
            box-shadow: 0 4px 16px rgba(255, 107, 122, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        
        .layui-btn-danger:hover {
            background: linear-gradient(135deg, rgba(255, 107, 122, 0.35), rgba(255, 79, 139, 0.25));
            border-color: #ff6b7a;
            box-shadow: 0 8px 24px rgba(255, 107, 122, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.15);
        }
        
        .layui-btn-warm {
            background: linear-gradient(135deg, rgba(255, 188, 94, 0.25), rgba(255, 122, 89, 0.15));
            border: 1px solid rgba(255, 188, 94, 0.4);
            color: #ffbc5e;
            box-shadow: 0 4px 16px rgba(255, 188, 94, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        
        .layui-btn-warm:hover {
            background: linear-gradient(135deg, rgba(255, 188, 94, 0.35), rgba(255, 122, 89, 0.25));
            border-color: #ffbc5e;
            box-shadow: 0 8px 24px rgba(255, 188, 94, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.15);
        }
        
        .layui-btn-primary {
            background: rgba(6, 24, 38, 0.6);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }
        
        .layui-btn-primary:hover {
            background: rgba(6, 24, 38, 0.8);
            border-color: var(--glow-green);
            color: var(--glow-green);
            box-shadow: 0 4px 16px rgba(0, 247, 255, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        
        /* 执行状态动画 */
        .execution-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .execution-status.running {
            background: linear-gradient(135deg, rgba(0, 247, 255, 0.25), rgba(19, 212, 255, 0.15));
            border: 1px solid rgba(0, 247, 255, 0.4);
            color: var(--glow-green);
            box-shadow: 0 0 12px rgba(0, 247, 255, 0.2);
        }
        
        .execution-status.success {
            background: linear-gradient(135deg, rgba(50, 210, 150, 0.25), rgba(55, 220, 168, 0.15));
            border: 1px solid rgba(50, 210, 150, 0.4);
            color: #32d296;
            box-shadow: 0 0 12px rgba(50, 210, 150, 0.2);
        }
        
        .execution-status.failed {
            background: linear-gradient(135deg, rgba(255, 107, 122, 0.25), rgba(255, 79, 139, 0.15));
            border: 1px solid rgba(255, 107, 122, 0.4);
            color: #ff6b7a;
            box-shadow: 0 0 12px rgba(255, 107, 122, 0.2);
        }
        
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .status-icon {
            width: 16px;
            height: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        
        .status-icon svg {
            width: 16px;
            height: 16px;
        }
        
        .checkmark {
            stroke-dasharray: 20;
            stroke-dashoffset: 20;
            animation: drawCheck 0.3s ease forwards;
        }
        
        @keyframes drawCheck {
            to { stroke-dashoffset: 0; }
        }
        
        .cross {
            stroke-dasharray: 20;
            stroke-dashoffset: 20;
            animation: drawCross 0.3s ease forwards;
        }
        
        @keyframes drawCross {
            to { stroke-dashoffset: 0; }
        }
    </style>
</head>
<body>
<div class="page-container">
    <div class="stats-panel">
        <h2 style="margin: 0;">🔄 工作流管理</h2>
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-value" id="stat-total">0</div>
                <div class="stat-label">总工作流</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-enabled">0</div>
                <div class="stat-label">已启用</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-runs">0</div>
                <div class="stat-label">总执行次数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-success-rate">0%</div>
                <div class="stat-label">成功率</div>
            </div>
        </div>
    </div>
    
    <div style="margin-bottom: 20px;">
        <button class="layui-btn layui-btn-normal" onclick="showWorkflowModal()">
            <i class="layui-icon layui-icon-add-1"></i> 新建工作流
        </button>
        <button class="layui-btn layui-btn-primary" onclick="loadWorkflows()">
            <i class="layui-icon layui-icon-refresh"></i> 刷新
        </button>

    </div>
    
    <div id="workflow-list"></div>
</div>

<script src="/static/layui/layui-v2.13.6/layui/layui.js"></script>
<script>
layui.use(['layer', 'form'], function() {
    var layer = layui.layer;
    var form = layui.form;
    var $ = layui.$;
    
    // 获取 XSRF token
    function getCookie(name) {
        var r = document.cookie.match("\\b" + name + "=([^;]*)\\b");
        return r ? r[1] : undefined;
    }
    
    var xsrfToken = getCookie("_xsrf");
    
    // 设置全局 AJAX 默认配置
    $.ajaxSetup({
        beforeSend: function(xhr) {
            xhr.setRequestHeader("X-XSRFToken", xsrfToken);
        }
    });
    
    function loadWorkflows() {
        $.get('/admin/workflow/api?action=list', function(res) {
            if (res.code === 0) {
                renderWorkflows(res.data.workflows);
                updateStats(res.data.workflows);
            }
        });
    }
    
    function renderWorkflows(workflows) {
        var html = '';
        if (workflows.length === 0) {
            html = '<div style="text-align: center; padding: 40px; color: #79aebb;">暂无工作流</div>';
        } else {
            workflows.forEach(function(wf) {
                var nodes = wf.nodes_config || [];
                var nodesHtml = nodes.map(function(n) {
                    return '<span class="node-item">📍 ' + n.name + '</span>';
                }).join('');
                
                html += `
                    <div class="workflow-card" id="workflow-card-${wf.id}">
                        <div class="workflow-header">
                            <div class="workflow-name">${wf.name}</div>
                            <div style="display: flex; gap: 8px; align-items: center;">
                                <span class="execution-status" id="exec-status-${wf.id}" style="display: none;"></span>
                                <span class="workflow-type">${wf.workflow_type}</span>
                            </div>
                        </div>
                        <div style="color: #b7dbe5; margin-bottom: 10px;">${wf.description || '无描述'}</div>
                        <div class="workflow-nodes">${nodesHtml}</div>
                        <div style="color: #79aebb; font-size: 12px;">
                            运行：${wf.run_count} | 成功：${wf.success_count} | 失败：${wf.fail_count} | 
                            最后运行：${wf.last_run_time || '未执行'}
                        </div>
                        <div style="margin-top: 15px;">
                            <button class="layui-btn layui-btn-sm layui-btn-normal" onclick="editWorkflow(${wf.id})">编辑</button>
                            <button class="layui-btn layui-btn-sm layui-btn-warm" onclick="runWorkflow(${wf.id})">立即执行</button>
                            <button class="layui-btn layui-btn-sm ${wf.enabled ? 'layui-btn-danger' : 'layui-btn-primary'}" 
                                    onclick="toggleWorkflow(${wf.id})">${wf.enabled ? '停止' : '启动'}</button>
                            <button class="layui-btn layui-btn-sm layui-btn-danger" onclick="deleteWorkflow(${wf.id})">删除</button>
                        </div>
                    </div>
                `;
            });
        }
        $('#workflow-list').html(html);
    }
    
    function updateStats(workflows) {
        var total = workflows.length;
        var enabled = workflows.filter(w => w.enabled).length;
        var runs = workflows.reduce((sum, w) => sum + w.run_count, 0);
        var success = workflows.reduce((sum, w) => sum + w.success_count, 0);
        var rate = runs > 0 ? Math.round(success / runs * 100) : 0;
        
        $('#stat-total').text(total);
        $('#stat-enabled').text(enabled);
        $('#stat-runs').text(runs);
        $('#stat-success-rate').text(rate + '%');
    }
    
    window.showWorkflowModal = function(wfId) {
        // 简化实现，实际应该使用完整的表单
        layer.msg('工作流编辑功能', {icon: 1});
    };
    
    window.editWorkflow = function(wfId) {
        showWorkflowModal(wfId);
    };
    
    window.runWorkflow = function(wfId) {
        // 显示执行中状态
        var statusEl = $('#exec-status-' + wfId);
        statusEl.show().removeClass('success failed').addClass('running')
            .html('<span class="spinner"></span> 执行中...');
        
        $.post('/admin/workflow/api', {
            action: 'run_now',
            workflow_id: wfId
        }, function(res) {
            if (res.code === 0) {
                // 执行成功，显示勾勾
                statusEl.removeClass('running').addClass('success')
                    .html('<span class="status-icon"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path class="checkmark" d="M3 8l4 4 6-8"/></svg></span> 成功');
                setTimeout(function() {
                    statusEl.fadeOut(300);
                }, 3000);
                loadWorkflows();
            } else {
                // 执行失败，显示叉叉
                statusEl.removeClass('running').addClass('failed')
                    .html('<span class="status-icon"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path class="cross" d="M4 4l8 8M12 4l-8 8"/></svg></span> 失败');
                setTimeout(function() {
                    statusEl.fadeOut(300);
                }, 3000);
            }
        }).fail(function() {
            statusEl.removeClass('running').addClass('failed')
                .html('<span class="status-icon"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path class="cross" d="M4 4l8 8M12 4l-8 8"/></svg></span> 失败');
            setTimeout(function() {
                statusEl.fadeOut(300);
            }, 3000);
        });
    };
    
    window.toggleWorkflow = function(wfId) {
        $.post('/admin/workflow/api', {
            action: 'toggle',
            workflow_id: wfId
        }, function(res) {
            layer.msg(res.msg, {icon: res.code === 0 ? 1 : 2});
            loadWorkflows();
        });
    };
    
    window.deleteWorkflow = function(wfId) {
        layer.confirm('确定删除此工作流吗？', function(index) {
            $.post('/admin/workflow/api', {
                action: 'delete',
                workflow_id: wfId
            }, function(res) {
                layer.msg(res.msg, {icon: res.code === 0 ? 1 : 2});
                layer.close(index);
                loadWorkflows();
            });
        });
    };
    
    window.showTemplates = function() {
        $.get('/admin/workflow/api?action=templates', function(res) {
            if (res.code === 0) {
                var templates = res.data.templates;
                var html = '<div style="padding: 20px; background: #02101d;">';
                templates.forEach(function(t) {
                    html += `<div style="border: 1px solid rgba(30, 228, 255, 0.2); padding: 15px; margin-bottom: 15px; border-radius: 8px; background: rgba(6, 24, 38, 0.82); backdrop-filter: blur(14px);">
                        <h4 style="color: #ecfcff;">${t.name}</h4>
                        <p style="color: #b7dbe5;">${t.description}</p>
                        <button class="layui-btn layui-btn-sm layui-btn-normal" onclick="useTemplate('${t.id}')">使用此模板</button>
                    </div>`;
                });
                html += '</div>';
                
                layer.open({
                    type: 1,
                    title: '选择模板',
                    area: ['600px', '500px'],
                    content: html
                });
            }
        });
    };
    
    window.useTemplate = function(templateId) {
        layer.msg('模板使用功能开发中', {icon: 1});
    };
    
    loadWorkflows();
});
</script>
</body>
</html>
