<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户列表</title>
    <link rel="stylesheet" href="{{ static_url('layui/layui-v2.13.6/layui/css/layui.css') }}">
    <link rel="stylesheet" href="{{ static_url('fontawesome/fontawesome-free-5.15.4-web/css/all.min.css') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f2f2f2;
            padding: 15px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .search-bar,
        .table-container {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .search-bar {
            margin-bottom: 15px;
        }

        .layui-table th {
            background: #f8f9fa;
            color: #333;
            font-weight: 500;
        }

        .layui-btn-group {
            margin-bottom: 15px;
        }

        .status-badge,
        .role-badge,
        .user-type-badge {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
        }

        .status-normal {
            background: #e6f7e6;
            color: #52c41a;
        }

        .status-disabled {
            background: #fff1f0;
            color: #ff4d4f;
        }

        .role-admin {
            background: #e6f7ff;
            color: #1890ff;
        }

        .role-system {
            background: #fff7e6;
            color: #fa8c16;
        }

        .user-type-system {
            background: #fff1f0;
            color: #cf1322;
        }

        .user-type-normal {
            background: #f5f5f5;
            color: #666;
        }

        .tip-text {
            color: #999;
            font-size: 12px;
        }
    </style>
    <link rel="stylesheet" href="{{ static_url('css/admin-premium-dark.css') }}">
</head>
<body>
    <div class="search-bar">
        <form class="layui-form" lay-filter="searchForm">
            <div class="layui-form-item">
                <div class="layui-inline">
                    <label class="layui-form-label">关键词</label>
                    <div class="layui-input-inline">
                        <input type="text" name="keyword" placeholder="用户名/邮箱/手机号/角色" autocomplete="off" class="layui-input" style="width: 240px;">
                    </div>
                </div>
                <div class="layui-inline">
                    <button type="button" class="layui-btn layui-btn-normal" id="searchBtn">
                        <i class="layui-icon layui-icon-search"></i> 搜索
                    </button>
                    <button type="button" class="layui-btn layui-btn-primary" id="resetBtn">
                        <i class="layui-icon layui-icon-refresh"></i> 重置
                    </button>
                </div>
            </div>
        </form>
    </div>

    <div class="table-container">
        <div class="layui-btn-group">
            <button type="button" class="layui-btn layui-btn-normal" id="addBtn">
                <i class="layui-icon layui-icon-add-1"></i> 新增用户
            </button>
            <button type="button" class="layui-btn layui-btn-danger" id="batchDeleteBtn">
                <i class="layui-icon layui-icon-delete"></i> 批量删除
            </button>
        </div>

        <table class="layui-hide" id="userTable" lay-filter="userTable"></table>

        <script type="text/html" id="statusTpl">
            {{!# if(d.status === 1) { }}
                <span class="status-badge status-normal">正常</span>
            {{!# } else { }}
                <span class="status-badge status-disabled">禁用</span>
            {{!# } }}
        </script>

        <script type="text/html" id="roleTpl">
            {{!# if(d.is_system === 1) { }}
                <span class="role-badge role-system">{{!d.role}}</span>
            {{!# } else { }}
                <span class="role-badge role-admin">{{!d.role}}</span>
            {{!# } }}
        </script>

        <script type="text/html" id="userTypeTpl">
            {{!# if(d.is_system === 1) { }}
                <span class="user-type-badge user-type-system">系统用户</span>
            {{!# } else { }}
                <span class="user-type-badge user-type-normal">普通用户</span>
            {{!# } }}
        </script>

        <script type="text/html" id="toolbar">
            <div class="layui-btn-container">
                {{!# if(d.is_system === 1) { }}
                <button class="layui-btn layui-btn-sm layui-btn-normal" lay-event="changePwd">
                    <i class="layui-icon layui-icon-password"></i> 改密码
                </button>
                <span class="tip-text">系统用户不可修改/删除</span>
                {{!# } else { }}
                <button class="layui-btn layui-btn-sm" lay-event="edit">
                    <i class="layui-icon layui-icon-edit"></i> 编辑
                </button>
                <button class="layui-btn layui-btn-sm layui-btn-normal" lay-event="changePwd">
                    <i class="layui-icon layui-icon-password"></i> 改密码
                </button>
                <button class="layui-btn layui-btn-sm layui-btn-danger" lay-event="delete">
                    <i class="layui-icon layui-icon-delete"></i> 删除
                </button>
                {{!# } }}
            </div>
        </script>
    </div>

    <script type="text/html" id="addFormTpl">
        <form class="layui-form" id="addForm" lay-filter="addForm" style="padding: 20px;">
            <div class="layui-form-item">
                <label class="layui-form-label">用户名</label>
                <div class="layui-input-block">
                    <input type="text" name="username" placeholder="请输入用户名" autocomplete="off" class="layui-input">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">密码</label>
                <div class="layui-input-block">
                    <input type="password" name="password" placeholder="请输入密码" autocomplete="off" class="layui-input">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">邮箱</label>
                <div class="layui-input-block">
                    <input type="text" name="email" placeholder="请输入邮箱" autocomplete="off" class="layui-input">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">手机号</label>
                <div class="layui-input-block">
                    <input type="text" name="phone" placeholder="请输入手机号" autocomplete="off" class="layui-input">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">角色</label>
                <div class="layui-input-block">
                    <select name="role"></select>
                </div>
            </div>
        </form>
    </script>

    <script type="text/html" id="editFormTpl">
        <form class="layui-form" id="editForm" lay-filter="editForm" style="padding: 20px;">
            <input type="hidden" name="id" value="{{!d.id}}">
            <div class="layui-form-item">
                <label class="layui-form-label">用户名</label>
                <div class="layui-input-block">
                    <input type="text" name="username" value="{{!d.username}}" disabled autocomplete="off" class="layui-input layui-disabled">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">邮箱</label>
                <div class="layui-input-block">
                    <input type="text" name="email" value="{{!d.email}}" placeholder="请输入邮箱" autocomplete="off" class="layui-input">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">手机号</label>
                <div class="layui-input-block">
                    <input type="text" name="phone" value="{{!d.phone}}" placeholder="请输入手机号" autocomplete="off" class="layui-input">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">角色</label>
                <div class="layui-input-block">
                    <select name="role" data-current-role="{{!d.role}}"></select>
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">状态</label>
                <div class="layui-input-block">
                    <input type="checkbox" name="status" lay-skin="switch" lay-text="正常|禁用" {{!d.status === 1 ? 'checked' : ''}}>
                </div>
            </div>
        </form>
    </script>

    <script type="text/html" id="passwordFormTpl">
        <form class="layui-form" id="passwordForm" style="padding: 20px;">
            <input type="hidden" name="id" value="{{!d.id}}">
            <div class="layui-form-item">
                <label class="layui-form-label">用户名</label>
                <div class="layui-input-block">
                    <input type="text" value="{{!d.username}}" disabled autocomplete="off" class="layui-input layui-disabled">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">新密码</label>
                <div class="layui-input-block">
                    <input type="password" name="password" placeholder="请输入新密码" autocomplete="off" class="layui-input">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">确认密码</label>
                <div class="layui-input-block">
                    <input type="password" name="confirm_password" placeholder="请再次输入新密码" autocomplete="off" class="layui-input">
                </div>
            </div>
        </form>
    </script>

    <script src="{{ static_url('layui/layui-v2.13.6/layui/layui.js') }}"></script>
    <script>
        layui.use(['table', 'layer', 'form', 'jquery'], function(){
            var table = layui.table;
            var layer = layui.layer;
            var form = layui.form;
            var $ = layui.jquery;
            var roleOptions = [];

            function getXsrfToken() {
                var match = document.cookie.match(/(?:^|; )_xsrf=([^;]+)/);
                return match ? decodeURIComponent(match[1]) : '';
            }

            function postData(url, data, callback) {
                data._xsrf = getXsrfToken();
                $.post(url, data, callback, 'json');
            }

            function loadRoleOptions(callback) {
                $.get('/admin/api/user', {action: 'role_options'}, function(res){
                    if (res.code !== 0) {
                        layer.msg(res.msg || '角色数据加载失败', {icon: 2});
                        return;
                    }
                    roleOptions = res.data || [];
                    if (callback) {
                        callback();
                    }
                }, 'json');
            }

            function renderRoleSelect(layero, currentRole) {
                var html = '<option value="">请选择角色</option>';
                for (var i = 0; i < roleOptions.length; i++) {
                    var item = roleOptions[i];
                    var selected = (currentRole === item.name || currentRole === item.code) ? ' selected' : '';
                    html += '<option value="' + item.code + '"' + selected + '>' + item.name + '</option>';
                }
                layero.find('select[name="role"]').html(html);
                form.render('select');
            }

            var tableIns = table.render({
                elem: '#userTable',
                url: '/admin/api/user',
                method: 'get',
                page: {
                    limit: 20,
                    limits: [10, 20, 50, 100]
                },
                cols: [[
                    {type: 'checkbox', fixed: 'left'},
                    {field: 'id', title: 'ID', width: 80, sort: true, fixed: 'left'},
                    {field: 'username', title: '用户名', width: 150},
                    {field: 'is_system', title: '用户类型', width: 110, templet: '#userTypeTpl'},
                    {field: 'role', title: '角色信息', width: 140, templet: '#roleTpl'},
                    {field: 'email', title: '邮箱', width: 200},
                    {field: 'phone', title: '手机号', width: 150},
                    {field: 'status', title: '状态', width: 100, templet: '#statusTpl'},
                    {field: 'create_at', title: '创建时间', width: 180},
                    {field: 'update_at', title: '更新时间', width: 180},
                    {title: '操作', width: 300, toolbar: '#toolbar', fixed: 'right'}
                ]],
                parseData: function(res){
                    return {
                        "code": res.code,
                        "msg": res.msg,
                        "count": res.count,
                        "data": res.data
                    };
                }
            });

            $('#searchBtn').on('click', function(){
                tableIns.reload({
                    url: '/admin/api/user',
                    where: {keyword: $('input[name="keyword"]').val()},
                    page: {curr: 1}
                });
            });

            $('#resetBtn').on('click', function(){
                $('input[name="keyword"]').val('');
                tableIns.reload({where: {}, page: {curr: 1}});
            });

            $('#addBtn').on('click', function(){
                layer.open({
                    type: 1,
                        closeBtn: 1,
                    title: '新增用户',
                    area: ['500px', '450px'],
                    content: $('#addFormTpl').html(),
                    btn: ['确定', '取消'],
                    success: function(layero){
                        renderRoleSelect(layero, '');
                    },
                    yes: function(index, layero){
                        var formData = {};
                        layero.find('input, select').each(function(){
                            var name = $(this).attr('name');
                            var val = $(this).val();
                            if (name) {
                                formData[name] = val;
                            }
                        });

                        if (!formData.username || !formData.password) {
                            layer.msg('用户名和密码不能为空', {icon: 2});
                            return;
                        }
                        if (!formData.role) {
                            layer.msg('请选择角色', {icon: 2});
                            return;
                        }

                        formData.action = 'add';

                        postData('/admin/api/user', formData, function(res){
                            if (res.code === 0) {
                                layer.msg('新增成功', {icon: 1});
                                layer.close(index);
                                tableIns.reload();
                            } else {
                                layer.msg(res.msg, {icon: 2});
                            }
                        });
                    }
                });
            });

            table.on('tool(userTable)', function(obj){
                var data = obj.data;

                if (obj.event === 'edit') {
                    layer.open({
                        type: 1,
                        closeBtn: 1,
                        title: '编辑用户',
                        area: ['500px', '450px'],
                        content: layui.laytpl($('#editFormTpl').html()).render(data),
                        btn: ['确定', '取消'],
                        success: function(layero){
                            renderRoleSelect(layero, data.role);
                        },
                        yes: function(index, layero){
                            var formData = {id: data.id, action: 'update'};
                            layero.find('input, select').each(function(){
                                var name = $(this).attr('name');
                                if (name === 'status') {
                                    formData[name] = $(this).is(':checked') ? 1 : 0;
                                } else if (name) {
                                    formData[name] = $(this).val();
                                }
                            });

                            if (!formData.role) {
                                layer.msg('请选择角色', {icon: 2});
                                return;
                            }

                            postData('/admin/api/user', formData, function(res){
                                if (res.code === 0) {
                                    layer.msg('修改成功', {icon: 1});
                                    layer.close(index);
                                    tableIns.reload();
                                } else {
                                    layer.msg(res.msg, {icon: 2});
                                }
                            });
                        }
                    });
                } else if (obj.event === 'changePwd') {
                    layer.open({
                        type: 1,
                        closeBtn: 1,
                        title: '修改密码',
                        area: ['500px', '320px'],
                        content: layui.laytpl($('#passwordFormTpl').html()).render(data),
                        btn: ['确定', '取消'],
                        yes: function(index, layero){
                            var password = layero.find('input[name="password"]').val();
                            var confirmPassword = layero.find('input[name="confirm_password"]').val();

                            if (!password) {
                                layer.msg('请输入新密码', {icon: 2});
                                return;
                            }
                            if (password !== confirmPassword) {
                                layer.msg('两次输入的密码不一致', {icon: 2});
                                return;
                            }

                            postData('/admin/api/user', {
                                action: 'change_password',
                                id: data.id,
                                password: password
                            }, function(res){
                                if (res.code === 0) {
                                    layer.msg(res.msg || '密码修改成功', {icon: 1});
                                    layer.close(index);
                                } else {
                                    layer.msg(res.msg || '密码修改失败', {icon: 2});
                                }
                            });
                        }
                    });
                } else if (obj.event === 'delete') {
                    layer.confirm('确定要删除该用户吗？', {icon: 3, title: '提示'}, function(index){
                        postData('/admin/api/user', {action: 'delete', id: data.id}, function(res){
                            if (res.code === 0) {
                                layer.msg('删除成功', {icon: 1});
                                tableIns.reload();
                            } else {
                                layer.msg(res.msg, {icon: 2});
                            }
                        });
                        layer.close(index);
                    });
                }
            });

            $('#batchDeleteBtn').on('click', function(){
                var checkStatus = table.checkStatus('userTable');
                var data = checkStatus.data;

                if (data.length === 0) {
                    layer.msg('请选择要删除的用户', {icon: 0});
                    return;
                }

                var ids = data.map(function(item){
                    return item.id;
                }).join(',');

                layer.confirm('确定要删除选中的 ' + data.length + ' 个用户吗？系统用户将自动跳过。', {icon: 3, title: '提示'}, function(index){
                    postData('/admin/api/user', {action: 'batch_delete', ids: ids}, function(res){
                        if (res.code === 0) {
                            layer.msg(res.msg, {icon: 1});
                            tableIns.reload();
                        } else {
                            layer.msg(res.msg, {icon: 2});
                        }
                    });
                    layer.close(index);
                });
            });

            loadRoleOptions();
        });
    </script>
</body>
</html>
