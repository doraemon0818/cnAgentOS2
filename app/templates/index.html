        function toggleMusicCardPlayback(button) {
            var card = button && button.closest('.music-card');
            var audio = card ? card.querySelector('.music-audio') : null;
            var label = button ? button.querySelector('.music-play-label') : null;
            var playIcon = '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 6.5v11l9-5.5-9-5.5Z"></path></svg>';
            var pauseIcon = '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 4h4v16H6V4Zm8 0h4v16h-4V4Z"></path></svg>';
            if (!audio || !label) {
                return;
            }
            if (audio.paused) {
                audio.play().then(function(){
                    label.textContent = '暂停';
                    button.innerHTML = pauseIcon + '<span class="music-play-label">暂停</span>';
                    startMusicProgressTracking(audio);
                }).catch(function(){
                    label.textContent = '播放失败';
                });
            } else {
                audio.pause();
                label.textContent = '播放';
                button.innerHTML = playIcon + '<span class="music-play-label">播放</span>';
                stopMusicProgressTracking(audio);
            }
        }

        function formatMusicTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            var mins = Math.floor(seconds / 60);
            var secs = Math.floor(seconds % 60);
            return mins + ':' + (secs < 10 ? '0' : '') + secs;
        }

        function startMusicProgressTracking(audio) {
            if (!audio) return;
            var updateProgress = function() {
                if (audio.paused || audio.ended) {
                    stopMusicProgressTracking(audio);
                    return;
                }
                var card = audio.closest('.music-card');
                if (!card) return;
                var currentTime = audio.currentTime || 0;
                var duration = audio.duration || 0;
                var progressFill = card.querySelector('.music-progress-fill');
                var progressHandle = card.querySelector('.music-progress-handle');
                var timeCurrent = card.querySelector('.music-time-current');
                var timeTotal = card.querySelector('.music-time-total');
                if (progressFill && duration > 0) {
                    var percent = (currentTime / duration) * 100;
                    progressFill.style.width = percent + '%';
                    if (progressHandle) {
                        progressHandle.style.left = percent + '%';
                    }
                }
                if (timeCurrent) {
                    timeCurrent.textContent = formatMusicTime(currentTime);
                }
                if (timeTotal && duration > 0) {
                    timeTotal.textContent = formatMusicTime(duration);
                }
                requestAnimationFrame(updateProgress);
            };
            audio._progressTimer = requestAnimationFrame(updateProgress);
        }

        function stopMusicProgressTracking(audio) {
            if (audio && audio._progressTimer) {
                cancelAnimationFrame(audio._progressTimer);
                audio._progressTimer = null;
            }
        }

        function onMusicEnded(audio) {
            var card = audio && audio.closest('.music-card');
            if (!card) return;
            var playlistStr = card.getAttribute('data-playlist');
            var currentIndex = parseInt(card.getAttribute('data-current-index') || '0', 10);
            var playlist = [];
            try {
                playlist = JSON.parse(playlistStr || '[]');
            } catch (e) {
                playlist = [];
            }
            if (playlist.length > 1 && currentIndex < playlist.length - 1) {
                musicNext(card.querySelector('.music-next-btn'));
            } else {
                resetMusicCardPlayback(audio);
            }
        }

        function resetMusicCardPlayback(audio) {
            var card = audio && audio.closest('.music-card');
            var playBtn = card ? card.querySelector('.music-play-btn') : null;
            var label = playBtn ? playBtn.querySelector('.music-play-label') : null;
            var playIcon = '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 6.5v11l9-5.5-9-5.5Z"></path></svg>';
            if (label) {
                label.textContent = '播放';
            }
            if (playBtn) {
                playBtn.innerHTML = playIcon + '<span class="music-play-label">播放</span>';
            }
            var progressFill = card ? card.querySelector('.music-progress-fill') : null;
            var progressHandle = card ? card.querySelector('.music-progress-handle') : null;
            var timeCurrent = card ? card.querySelector('.music-time-current') : null;
            if (progressFill) progressFill.style.width = '0%';
            if (progressHandle) progressHandle.style.left = '0%';
            if (timeCurrent) timeCurrent.textContent = '0:00';
            stopMusicProgressTracking(audio);
        }

        function changeMusicVolume(slider) {
            var card = slider && slider.closest('.music-card');
            var audio = card ? card.querySelector('.music-audio') : null;
            if (audio) {
                audio.volume = (parseInt(slider.value, 10) || 80) / 100;
            }
        }

        function musicPrev(button) {
            var card = button && button.closest('.music-card');
            if (!card) return;
            var playlistStr = card.getAttribute('data-playlist');
            var currentIndex = parseInt(card.getAttribute('data-current-index') || '0', 10);
            var playlist = [];
            try {
                playlist = JSON.parse(playlistStr || '[]');
            } catch (e) {
                playlist = [];
            }
            if (playlist.length <= 1) return;
            var newIndex = currentIndex > 0 ? currentIndex - 1 : playlist.length - 1;
            loadMusicTrack(card, playlist, newIndex);
        }

        function musicNext(button) {
            var card = button && button.closest('.music-card');
            if (!card) return;
            var playlistStr = card.getAttribute('data-playlist');
            var currentIndex = parseInt(card.getAttribute('data-current-index') || '0', 10);
            var playlist = [];
            try {
                playlist = JSON.parse(playlistStr || '[]');
            } catch (e) {
                playlist = [];
            }
            if (playlist.length <= 1) return;
            var newIndex = currentIndex < playlist.length - 1 ? currentIndex + 1 : 0;
            loadMusicTrack(card, playlist, newIndex);
        }

        function loadMusicTrack(card, playlist, index) {
            if (!card || !playlist || index < 0 || index >= playlist.length) return;
            var track = playlist[index];
            if (!track) return;
            var audio = card.querySelector('.music-audio');
            var playUrl = track.Music || track.music || track.url || track.audio || track.play_url || '';
            if (!playUrl || !audio) return;
            audio.src = playUrl;
            audio.load();
            card.setAttribute('data-current-index', index);
            var titleEl = card.querySelector('.music-title');
            var artistEl = card.querySelector('.music-artist');
            var coverEl = card.querySelector('.music-cover');
            if (titleEl) titleEl.textContent = track.song || track.name || track.title || '音乐推荐';
            if (artistEl) artistEl.textContent = track.singer || track.artist || track.author || '未知歌手';
            if (coverEl) {
                var cover = track.cover || track.pic || track.image || track.poster || '';
                var proxyCover = getProxyImageUrl(cover);
                if (proxyCover) {
                    coverEl.innerHTML = '<img src="' + escapeHtml(proxyCover) + '" alt="' + escapeHtml(track.song || track.name || track.title || '') + '" onload="this.style.display=\'block\';var fb=this.nextElementSibling;if(fb)fb.style.display=\'none\';" onerror="this.style.display=\'none\';var fb=this.nextElementSibling;if(fb)fb.style.display=\'flex\';">' +
                        '<div class="music-cover-fallback" style="display:none;">♪</div>';
                } else {
                    coverEl.innerHTML = '<div class="music-cover-fallback">♪</div>';
                }
            }
            resetMusicCardPlayback(audio);
            var playBtn = card.querySelector('.music-play-btn');
            if (playBtn) {
                toggleMusicCardPlayback(playBtn);
            }
        }

        function initMusicProgressBars() {
            document.addEventListener('click', function(e) {
                var progressBar = e.target.closest('.music-progress-bar');
                if (!progressBar) return;
                var card = progressBar.closest('.music-card');
                var audio = card ? card.querySelector('.music-audio') : null;
                if (!audio || !audio.duration) return;
                var rect = progressBar.getBoundingClientRect();
                var clickX = e.clientX - rect.left;
                var percent = clickX / rect.width;
                audio.currentTime = percent * audio.duration;
            });
        }

        function buildMessageContentHtml(content, isMarkdown, extraData) {
            var weatherCard = resolveWeatherCard(extraData);
            if (weatherCard) {
                return renderWeatherCard(weatherCard);
            }
            var musicCard = resolveMusicCard(extraData);
            if (musicCard) {
                return renderMusicCard(musicCard);
            }
            return isMarkdown ? renderMarkdown(content) : escapeHtml(content).replace(/\n/g, '<br>');
        }

        function ensureChatReady() {
            var empty = document.getElementById('emptyPrompts');
            if (empty) {
                empty.remove();
            }
        }

        function buildMetaHtml(metaList) {
            return (metaList || []).map(function(item){
                return '<span class="badge">' + escapeHtml(item) + '</span>';
            }).join('');
        }

        function createMessageElement(role, metaList, content, id, isMarkdown, extraData) {
            ensureChatReady();
            var weatherCard = resolveWeatherCard(extraData);
            if (weatherCard) {
                var wrap = document.createElement('div');
                wrap.className = 'message-row weather-card-row';
                var cardContainer = document.createElement('div');
                cardContainer.className = 'weather-card-standalone';
                var cardHtml = renderWeatherCard(weatherCard);
                cardContainer.innerHTML = cardHtml;
                wrap.appendChild(cardContainer);
                document.getElementById('chatList').appendChild(wrap);
                scrollToBottom();
                var city = weatherCard.city || weatherCard.province || '天气';
                var weatherText = weatherCard.weather || weatherCard.text || '天气未知';
                var spots = getCitySpots(city);
                fetchWeatherImage(cardContainer, city, weatherText, spots);
                return wrap;
            }
            var musicCard = resolveMusicCard(extraData);
            var isMusic = !!musicCard;
            var wrap = document.createElement('div');
            wrap.className = 'message-row ' + role;
            var timeText = '';
            if (metaList && metaList.length > 1) {
                timeText = metaList[metaList.length - 1];
            }
            wrap.innerHTML =
                '<div class="message ' + role + (isMusic ? ' music-message' : '') + '"' + (id ? ' id="' + id + '"' : '') + '>' +
                    '<div class="message-meta">' + buildMetaHtml(metaList) + '</div>' +
                    '<div class="message-status"></div>' +
                    '<div class="message-content">' + buildMessageContentHtml(content, isMarkdown, extraData) + '</div>' +
                    '<div class="message-time">' + escapeHtml(timeText) + '</div>' +
                    '<div class="message-actions">' +
                        '<button class="message-action-btn" title="复制" onclick="copyMessage(this)" data-content="' + escapeAttr(content) + '">' +
                            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>' +
                        '</button>' +
                        '<button class="message-action-btn" title="删除" onclick="deleteMessage(this)">' +
                            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>' +
                        '</button>' +
                    '</div>' +
                '</div>';
            document.getElementById('chatList').appendChild(wrap);
            scrollToBottom();
            return wrap;
        }

        function fetchWeatherImage(cardContainer, city, weatherText, spots) {
            var weatherCard = cardContainer.querySelector('.weather-card');
            if (!weatherCard) return;
            var loadingDiv = document.createElement('div');
            loadingDiv.className = 'bg-loading';
            loadingDiv.textContent = '正在生成背景图...';
            weatherCard.appendChild(loadingDiv);
            fetch('/api/weather/image', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    city: city,
                    weather: weatherText,
                    spots: spots
                })
            })
            .then(function(response) {
                if (!response.ok) {
                    throw new Error('HTTP error! status: ' + response.status);
                }
                return response.json();
            })
            .then(function(result) {
                console.log('Weather image API response:', result);
                if (result.code === 0 && result.data && result.data.image_url) {
                    var imageUrl = result.data.image_url;
                    console.log('Setting background image:', imageUrl);
                    var img = new Image();
                    img.onload = function() {
                        weatherCard.style.backgroundImage = 'url(' + imageUrl + ')';
                        weatherCard.classList.add('has-background');
                        console.log('Background image loaded successfully');
                    };
                    img.onerror = function() {
                        console.error('Failed to load background image:', imageUrl);
                    };
                    img.src = imageUrl;
                } else {
                    console.warn('Weather image API returned error:', result.msg);
                }
                if (loadingDiv.parentNode) {
                    loadingDiv.parentNode.removeChild(loadingDiv);
                }
            })
            .catch(function(error) {
                console.error('Weather image generation failed:', error);
                if (loadingDiv.parentNode) {
                    loadingDiv.parentNode.removeChild(loadingDiv);
                }
            });
        }

        function setMessageStatus(id, text) {
            var node = document.getElementById(id);
            if (!node) { return; }
            node.querySelector('.message-status').innerHTML = text ? escapeHtml(text).replace(/\n/g, '<br>') : '';
            scrollToBottom();
        }

        function setMessageMeta(id, metaList) {
            var node = document.getElementById(id);
            if (!node) { return; }
            node.querySelector('.message-meta').innerHTML = buildMetaHtml(metaList);
        }

        function setMessageContent(id, content, isMarkdown, extraData) {
            var node = document.getElementById(id);
            if (!node) { return; }
            var musicCard = resolveMusicCard(extraData);
            var isMusic = !!musicCard;
            if (isMusic) {
                node.classList.add('music-message');
            } else {
                node.classList.remove('music-message');
            }
            node.querySelector('.message-content').innerHTML = buildMessageContentHtml(content, isMarkdown, extraData);
            scrollToBottom();
        }

        function buildAssistantMeta(data) {
            var meta = [];
            if (data.employee && data.employee.alias) {
                meta.push('@' + data.employee.alias);
                if (data.employee.category) {
                    meta.push(data.employee.category);
                }
            } else if (data.intent === 'db') {
                meta.push('智能问数');
            } else {
                meta.push('AI 对话');
            }
            if (data.model && data.model.name) {
                meta.push(data.model.name);
            }
            if (data.total_tokens) {
                meta.push('Token ' + data.total_tokens);
            }
            if (data.response_ms) {
                meta.push(data.response_ms + 'ms');
            }
            meta.push(formatTime(data.create_at || getBeijingTimeStr()));
            return meta;
        }

        function renderEmployees(list) {
            state.employees = list || [];
            var container = document.getElementById('composerEmployees');
            var html = '';
            state.employees.forEach(function(item){
                html += '<span class="employee-tag" onclick="fillMessage(\'@' + escapeHtml(item.alias) + ' \')">@' + escapeHtml(item.alias) + '</span>';
            });
            container.innerHTML = html;
        }

        function renderModels(list) {
            state.models = list || [];
            var select = document.getElementById('modelSelect');
            var html = '';
            state.models.forEach(function(item){
                var selected = state.currentModelId ? Number(state.currentModelId) === Number(item.id) : Number(item.is_default) === 1;
                if (!state.currentModelId && selected) {
                    state.currentModelId = Number(item.id);
                }
                html += '<option value="' + item.id + '"' + (selected ? ' selected' : '') + '>' +
                    escapeHtml(item.name + ' / ' + item.model_name + (item.is_default ? '（默认）' : '')) +
                '</option>';
            });
            select.innerHTML = html || '<option value="">暂无可用模型</option>';
            if (!state.currentModelId && state.models.length) {
                state.currentModelId = Number(state.models[0].id);
            }
        }

        function renderSessions(list) {
            state.sessions = list || [];
            var html = '';
            state.sessions.forEach(function(item){
                var active = Number(item.id) === Number(state.currentSessionId);
                html += '<div class="history-item' + (active ? ' active' : '') + '" onclick="openSession(' + item.id + ')">';
                html += '<div class="history-title">' + escapeHtml(item.title || '新对话') + '</div>';
                html += '<div class="history-meta">';
                html += '<span>' + formatSessionTime(item.update_at || item.create_at) + '</span>';
                html += '<button class="history-delete-btn" onclick="event.stopPropagation(); deleteSession(' + item.id + ')" title="删除">' +
                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>' +
                    '</button>';
                html += '</div>';
                html += '</div>';
            });
            document.getElementById('historyList').innerHTML = html || '<div style="color:var(--ui-muted);font-size:12px;text-align:center;padding:20px;">暂无历史对话</div>';
        }

        function refreshSessions() {
            fetch('/api/chat/session')
                .then(function(resp){ return resp.json(); })
                .then(function(res){
                    if (res.code === 0) {
                        renderSessions((res.data || {}).sessions || []);
                    }
                });
        }

        async function deleteSession(sessionId) {
            if (!window.confirm('确认删除这条历史会话吗？')) {
                return;
            }
            try {
                var body = new URLSearchParams();
                body.set('_xsrf', getXsrfToken());
                body.set('action', 'delete');
                body.set('session_id', String(sessionId));
                var resp = await fetch('/api/chat/session', {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
                    body: body.toString()
                });
                var res = await resp.json();
                if (res.code !== 0) {
                    alert(res.msg || '删除失败');
                    return;
                }
                renderSessions((res.data || {}).sessions || []);
                state.sessions = (res.data || {}).sessions || [];
                if (Number(state.currentSessionId) === Number(sessionId)) {
                    startNewChat();
                }
            } catch (error) {
                alert('删除失败，请刷新页面后重试');
            }
        }

        function renderStoredMessage(item) {
            var meta = [];
            if (item.role === 'user') {
                meta = ['我', formatTime(item.create_at)];
                createMessageElement('user', meta, item.content_text || item.content_markdown || '', null, false, null);
                return;
            }
            var extra = item.extra || {};
            if (item.message_type === 'employee' && extra.employee && extra.employee.alias) {
                meta.push('@' + extra.employee.alias);
                if (extra.employee.category) {
                    meta.push(extra.employee.category);
                }
            } else if (item.intent === 'db' || item.message_type === 'db') {
                meta.push('智能问数');
            } else {
                meta.push('AI 对话');
            }
            if (item.model_name) {
                meta.push(item.model_name);
            }
            if (item.total_tokens) {
                meta.push('Token ' + item.total_tokens);
            }
            if (item.response_ms) {
                meta.push(item.response_ms + 'ms');
            }
            if (item.create_at) {
                meta.push(formatTime(item.create_at));
            }
            createMessageElement('assistant', meta, item.content_markdown || item.content_text || '', null, true, extra);
        }

        function openSession(sessionId, silent) {
            fetch('/api/chat/session?session_id=' + encodeURIComponent(sessionId))
                .then(function(resp){ return resp.json(); })
                .then(function(res){
                    if (res.code !== 0) {
                        if (!silent) {
                            alert(res.msg || '会话加载失败');
                        }
                        return;
                    }
                    var data = res.data || {};
                    var session = data.session || {};
                    state.currentSessionId = session.id;
                    if (session.model_id) {
                        state.currentModelId = Number(session.model_id);
                        document.getElementById('modelSelect').value = session.model_id;
                    }
                    document.getElementById('chatTitle').textContent = session.title || '历史对话';
                    var createAtFormatted = formatTime(session.create_at);
                    var updateAtFormatted = formatTime(session.update_at);
                    console.log('Session time debug:', { create_at: session.create_at, update_at: session.update_at, createAtFormatted, updateAtFormatted });
                    document.getElementById('chatSub').textContent = '创建于 ' + createAtFormatted + '，最近更新 ' + updateAtFormatted;
                    document.getElementById('chatList').innerHTML = '';
                    (data.messages || []).forEach(renderStoredMessage);
                    if (!(data.messages || []).length) {
                        renderEmptyPrompts();
                    }
                    renderSessions(state.sessions);
                    scrollToBottom();
                });
        }

        function syncCurrentSession(silent) {
            if (!state.currentSessionId) {
                return;
            }
            openSession(state.currentSessionId, silent !== false);
        }

        function bootstrap() {
            fetch('/api/chat/bootstrap')
                .then(function(resp){ return resp.json(); })
                .then(function(res){
                    if (res.code !== 0) {
                        alert(res.msg || '初始化失败');
                        return;
                    }
                    var data = res.data || {};
                    renderModels(data.models || []);
                    renderEmployees(data.employees || []);
                    renderSessions(data.sessions || []);
                });
        }

        function sendMessage() {
            var input = document.getElementById('messageInput');
            var message = (input.value || '').trim();
            if (!message) { return; }
            if (state.eventSource) {
                state.eventSource.close();
                state.eventSource = null;
            }

            createMessageElement('user', ['我', formatTime(new Date().toISOString())], message, null, false, null);
            var assistantId = 'assistant-' + Date.now();
            createMessageElement('assistant', ['处理中'], '', assistantId, true, null);
            setMessageStatus(assistantId, '正在初始化对话...');
            input.value = '';

            var params = new URLSearchParams();
            params.set('message', message);
            if (state.currentSessionId) {
                params.set('session_id', state.currentSessionId);
            }
            if (state.currentModelId && !message.trim().startsWith('@')) {
                params.set('model_id', state.currentModelId);
            }

            state.eventSource = new EventSource('/api/chat/stream?' + params.toString());
            var fullText = '';
            var streamFinished = false;

            state.eventSource.onmessage = function(event) {
                var data = JSON.parse(event.data);
                if (data.type === 'session') {
                    state.currentSessionId = data.session && data.session.id;
                    if (data.session && data.session.title) {
                        document.getElementById('chatTitle').textContent = data.session.title;
                    }
                    refreshSessions();
                } else if (data.type === 'status') {
                    setMessageStatus(assistantId, data.message || '');
                    if (data.intent === 'db') {
                        setMessageMeta(assistantId, ['智能问数', state.models.find(function(item){ return Number(item.id) === Number(state.currentModelId); }) ? state.models.find(function(item){ return Number(item.id) === Number(state.currentModelId); }).name : '']);
                    }
                } else if (data.type === 'delta') {
                    fullText += data.content || '';
                    setMessageMeta(assistantId, buildAssistantMeta(data));
                    setMessageStatus(assistantId, '');
                    setMessageContent(assistantId, fullText, true, data);
                } else if (data.type === 'done') {
                    streamFinished = true;
                    fullText = data.content || fullText;
                    setMessageMeta(assistantId, buildAssistantMeta(data));
                    setMessageStatus(assistantId, '');
                    setMessageContent(assistantId, fullText, true, data);
                    if (data.session_id) {
                        state.currentSessionId = data.session_id;
                    }
                    refreshSessions();
                    syncCurrentSession(true);
                    state.eventSource.close();
                    state.eventSource = null;
                } else if (data.type === 'error') {
                    streamFinished = true;
                    setMessageMeta(assistantId, ['错误']);
                    setMessageStatus(assistantId, '');
                    setMessageContent(assistantId, data.message || '服务异常', false);
                    if (state.eventSource) {
                        state.eventSource.close();
                        state.eventSource = null;
                    }
                    refreshSessions();
                    syncCurrentSession(true);
                }
            };

            state.eventSource.onerror = function() {
                if (streamFinished) {
                    return;
                }
                streamFinished = true;
                setMessageMeta(assistantId, ['异常']);
                setMessageStatus(assistantId, '');
                setMessageContent(assistantId, '连接中断或服务异常，请稍后重试。', false);
                if (state.eventSource) {
                    state.eventSource.close();
                    state.eventSource = null;
                }
                refreshSessions();
                syncCurrentSession(true);
            };
        }

        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('messageInput').addEventListener('keydown', function(event){
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        });
        document.getElementById('modelSelect').addEventListener('change', function(){
            state.currentModelId = Number(this.value || 0) || null;
        });
        initMusicProgressBars();

        bootstrap();
    </script>
</body>
</html>
